        const API_URL = `${PROXY_BASE}/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent`;

        /**
         * 動態取得 API Key：優先從 localStorage 讀取，否則使用預設值
         */
        function getApiKey() {
            try {
                const saved = localStorage.getItem('baymax_api_key');
                return saved && saved.trim() ? saved.trim() : DEFAULT_API_KEY;
            } catch (e) {
                return DEFAULT_API_KEY;
            }
        }

        // ==========================================
        // 共用工具函式
        // ==========================================

        /**
         * 安全讀取 localStorage，若資料損壞則回傳預設值
         */
        function safeReadStorage(key, fallback = []) {
            try {
                const raw = localStorage.getItem(key);
                return raw ? JSON.parse(raw) : fallback;
            } catch (e) {
                console.warn(`localStorage 讀取 "${key}" 失敗，使用預設值`, e);
                return fallback;
            }
        }

        /**
         * 自訂 Hook：帶有安全讀寫的 localStorage 狀態
         */
        function useLocalStorage(key, fallback = []) {
            const [state, setState] = useState(() => safeReadStorage(key, fallback));
            useEffect(() => {
                localStorage.setItem(key, JSON.stringify(state));
            }, [key, state]);
            return [state, setState];
        }

        /**
         * 將 File 物件轉為 Base64 字串（去除 data URI 前綴）
         */
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = reject;
            });
        }

        /**
         * 呼叫 Gemini API
         */
        async function callGemini(parts, systemPrompt) {
            const apiKey = getApiKey();
            if (!apiKey) throw new Error("請先在設定頁面填入 API Key");

            try {
                const response = await fetch(`${API_URL}?key=${apiKey}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ role: "user", parts }],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        generationConfig: { responseMimeType: "application/json" }
                    }),
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`API Error ${response.status}: ${errorText}`);
                }

                const data = await response.json();
                const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                return JSON.parse(text.replace(/```json|```/g, '').trim());
            } catch (error) {
                console.error("API Call Failed:", error);

                if (error.message.includes("Failed to fetch") || error.name === 'TypeError') {
                    alert(
                        "⚠️ CORS 連線錯誤 (Access Blocked)\n\n" +
                        "原因：Vercel 伺服器拒絕了您的連線。\n" +
                        "解決方法：\n" +
                        "1. 如果這是您的 Vercel 專案，請在 vercel.json 中加入 CORS Header。\n" +
                        "2. 如果不是，請使用瀏覽器外掛 'Allow CORS' (僅限測試)。"
                    );
                } else {
                    alert("連線失敗：" + error.message);
                }
                throw error;
            }
        }

                    <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/>
                    <circle cx="12" cy="10" r="3"/>
                </svg>
            ),
            Languages: (p) => (
                <svg {...p} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/>
                    <path d="m22 22-5-10-5 10"/><path d="M14 18h6"/>
                </svg>
            ),
        };
        // PenLine 與 Edit3 完全相同，統一使用 Edit3
        Icons.PenLine = Icons.Edit3;

        // ==========================================
        // 共用 UI 元件
        // ==========================================

        const BaymaxEyes = () => (
            <div className="flex items-center gap-2 animate-blink">
                <div className="w-2.5 h-2.5 bg-slate-800 rounded-full"></div>
                <div className="w-8 h-0.5 bg-slate-800"></div>
                <div className="w-2.5 h-2.5 bg-slate-800 rounded-full"></div>
            </div>
        );

        const FullBodyBaymax = () => (
            <svg viewBox="0 0 200 240" className="w-48 h-auto drop-shadow-xl animate-breathe">
                <ellipse cx="100" cy="130" rx="70" ry="85" fill="white" stroke="#1e293b" strokeWidth="2.5" />
                <ellipse cx="100" cy="50" rx="35" ry="25" fill="white" stroke="#1e293b" strokeWidth="2.5" />
                <circle cx="85" cy="50" r="4" fill="#1e293b" />
                <circle cx="115" cy="50" r="4" fill="#1e293b" />
                <line x1="85" y1="50" x2="115" y2="50" stroke="#1e293b" strokeWidth="2" />
                <ellipse cx="25" cy="110" rx="18" ry="45" fill="white" stroke="#1e293b" strokeWidth="2.5" transform="rotate(20 25 110)" />
                <path d="M65 185 L65 220 A 15 15 0 0 0 95 220 L95 185" fill="white" stroke="#1e293b" strokeWidth="2.5" />
                <path d="M105 185 L105 220 A 15 15 0 0 0 135 220 L135 185" fill="white" stroke="#1e293b" strokeWidth="2.5" />
                <path d="M60 180 Q100 195 140 180" fill="white" stroke="white" strokeWidth="4" />
                <path d="M60 180 Q100 195 140 180" fill="none" stroke="#1e293b" strokeWidth="2.5" />
                <ellipse cx="175" cy="110" rx="18" ry="45" fill="white" stroke="#1e293b" strokeWidth="2.5" transform="rotate(-20 175 110)" />
                <circle cx="125" cy="100" r="8" fill="#e2e8f0" stroke="#94a3b8" strokeWidth="1" opacity="0.8" />
            </svg>
        );

        /**
         * 共用的頁面頂部列（返回按鈕 + 標題）
         */
        const PageHeader = ({ onBack, title, bgClass = "bg-slate-50/90", children }) => (
            <div className={`flex items-center justify-between p-6 sticky top-0 z-10 ${bgClass} backdrop-blur-md`}>
                <div className="flex items-center gap-3">
                    <button onClick={onBack} className="w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-sm">
                        <Icons.ChevronLeft className="text-slate-600" />
                    </button>
                    <h2 className="text-xl font-bold text-slate-700">{title}</h2>
                </div>
                {children}
            </div>
        );

        /**
         * 共用的 Loading Spinner
         */
        const Spinner = ({ className = "w-4 h-4" }) => (
            <div className={`${className} border-2 border-white/30 border-t-white rounded-full animate-spin`} />
        );

        // ==========================================
        // 工具 1: 健康大白 (Health Analyzer)
        // ==========================================
        function ToolBaymax({ onBack }) {
            const [step, setStep] = useState('idle');
            const [images, setImages] = useState([]);
            const [result, setResult] = useState(null);
            const [loadingTip, setLoadingTip] = useState("掃描中...");

            // 清理 Object URLs 避免記憶體洩漏
            useEffect(() => {
                return () => {
                    images.forEach(img => URL.revokeObjectURL(img.preview));
                };
            }, [images]);

            useEffect(() => {
                if (step === 'analyzing') {
                    const tips = ["分析熱量...", "大白掃描中..."];
                    let i = 0;
                    const id = setInterval(() => setLoadingTip(tips[i++ % tips.length]), 2000);
                    return () => clearInterval(id);
                }
            }, [step]);

            const handleAnalyze = async () => {
                if (!images.length) return;
                setStep('analyzing');
                try {
                    const parts = await Promise.all(
                        images.map(async (img) => ({
                            inlineData: {
                                data: await fileToBase64(img.file),
                                mimeType: img.file.type
                            }
                        }))
                    );
                    const prompt = `你是大白,分析食品標示。JSON:{productName:"S",title:"S",verdict:{color:"green|red|yellow"},highlights:[{label:"S",value:"S",desc:"S"}],advice:{action:"S"}}`;
                    const data = await callGemini([...parts, { text: "分析食品" }], prompt);
                    setResult(data);
                    setStep('result');
                } catch (e) {
                    alert(e.message);
                    setStep('idle');
                }
            };

            const handleFile = (e) => {
                if (e.target.files.length) {
                    const newImages = Array.from(e.target.files).map(f => ({
                        file: f,
                        preview: URL.createObjectURL(f)
                    }));
                    setImages(prev => [...prev, ...newImages]);
                }
            };

            const removeImage = (index) => {
                setImages(prev => {
                    URL.revokeObjectURL(prev[index].preview);
                    return prev.filter((_, idx) => idx !== index);
                });
            };

            return (
                <div className="flex flex-col h-full animate-slide-up bg-slate-50 md:rounded-[2.5rem] overflow-hidden pt-safe-top">
                    <PageHeader onBack={onBack} title="健康大白" />

                    <div className="flex-1 overflow-y-auto p-6 no-scrollbar pb-safe-bottom">
                        {step === 'idle' && (
                            <div className="space-y-4 h-full flex flex-col">
                                <div className="bg-white rounded-[2rem] p-6 shadow-soft text-center flex-1">
                                    <div className="grid grid-cols-2 gap-3 mb-4">
                                        {images.map((img, i) => (
                                            <div key={i} className="relative aspect-square rounded-2xl overflow-hidden shadow-inner">
                                                <img src={img.preview} className="w-full h-full object-cover" />
                                                <button
                                                    onClick={() => removeImage(i)}
                                                    className="absolute top-1 right-1 bg-black/50 text-white rounded-full p-1"
                                                >
                                                    <Icons.X size={12} />
                                                </button>
                                            </div>
                                        ))}
                                        <label className="aspect-square flex flex-col items-center justify-center bg-slate-50 rounded-2xl cursor-pointer hover:bg-slate-100 transition border-2 border-dashed border-slate-200">
                                            <input type="file" multiple accept="image/*" onChange={handleFile} className="hidden" />
                                            <Icons.Camera className="text-slate-400" />
                                        </label>
                                    </div>
                                </div>
                                <button
                                    onClick={handleAnalyze}
                                    disabled={!images.length}
                                    className="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold shadow-lg shadow-slate-300 disabled:opacity-50"
                                >
                                    啟動掃描
                                </button>
                            </div>
                        )}

                        {step === 'analyzing' && (
                            <div className="h-full flex flex-col items-center justify-center">
                                <BaymaxEyes />
                                <p className="mt-4 text-slate-400">{loadingTip}</p>
                            </div>
                        )}

                        {step === 'result' && result && (
                            <div className="space-y-4 animate-slide-up">
                                <div className="bg-white rounded-[2rem] p-6 shadow-soft">
                                    <div className="flex justify-between items-start mb-4">
                                        <h3 className="text-2xl font-black text-slate-800">{result.productName}</h3>
                                        <div className={`w-10 h-10 rounded-full flex items-center justify-center ${
                                            result.verdict.color === 'green' ? 'bg-emerald-100 text-emerald-600' :
                                            result.verdict.color === 'red' ? 'bg-rose-100 text-rose-600' :
                                            'bg-yellow-100 text-yellow-600'
                                        }`}>●</div>
                                    </div>
                                    <p className="text-slate-600 font-bold mb-4">"{result.title}"</p>
                                    <div className="grid grid-cols-2 gap-3">
                                        {result.highlights.map((h, i) => (
                                            <div key={i} className="bg-slate-50 p-3 rounded-2xl text-center">
                                                <div className="text-xs text-slate-400">{h.label}</div>
                                                <div className="font-black text-slate-800">{h.value}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="bg-slate-800 text-white p-6 rounded-[2rem]">
                                    <p>"{result.advice.action}"</p>
                                </div>
                                <button
                                    onClick={() => setStep('idle')}
                                    className="w-full py-4 text-slate-400 font-bold"
                                >
                                    再測一次
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ==========================================
        // 工具 2: 記憶晶片 (Vocabulary Builder)
        // ==========================================
        function ToolVocab({ onBack }) {
            const [input, setInput] = useState("");
            const [loading, setLoading] = useState(false);
            const [history, setHistory] = useLocalStorage('vocab_history', []);

            const handleSearch = async () => {
                if (!input.trim()) return;
                setLoading(true);
                try {
                    const prompt = `你是語言學習助手。解釋單字"${input}"。JSON:{word:"S",meaning:"S",type:"S",example:"S",exampleTrans:"S"}`;
                    const data = await callGemini([{ text: input }], prompt);
                    setHistory(prev => [{ ...data, id: Date.now() }, ...prev]);
                    setInput("");
                } catch (e) {
                    alert("查詢失敗，請稍後再試");
                }
                setLoading(false);
            };

            return (
                <div className="flex flex-col h-full animate-slide-up bg-slate-50 md:rounded-[2.5rem] overflow-hidden pt-safe-top">
                    <PageHeader onBack={onBack} title="記憶晶片" bgClass="bg-slate-900/90" />

                    <div className="px-6 mb-4">
                        <div className="flex gap-2 bg-white p-2 rounded-[1.5rem] shadow-soft">
                            <input
                                value={input}
                                onChange={e => setInput(e.target.value)}
                                onKeyDown={e => e.key === 'Enter' && handleSearch()}
                                placeholder="輸入單字..."
                                className="flex-1 px-4 bg-transparent outline-none"
                            />
                            <button
                                onClick={handleSearch}
                                className="w-10 h-10 bg-rose-500 text-white rounded-full flex items-center justify-center shadow-lg shadow-rose-200"
                            >
                                {loading ? <Spinner /> : <Icons.Sparkles size={18} />}
                            </button>
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto px-6 no-scrollbar space-y-3 pb-safe-bottom">
                        {history.map(item => (
                            <div key={item.id} className="bg-white p-5 rounded-[1.5rem] shadow-soft relative group">
                                <button
                                    onClick={() => setHistory(h => h.filter(i => i.id !== item.id))}
                                    className="absolute top-4 right-4 text-slate-300 hover:text-rose-500"
                                >
                                    <Icons.Trash2 size={16} />
                                </button>
                                <h3 className="text-xl font-black text-slate-800">
                                    {item.word}
                                    <span className="text-xs bg-slate-100 text-slate-500 px-2 py-1 rounded-full font-bold ml-2 align-middle">
                                        {item.type}
                                    </span>
                                </h3>
                                <p className="text-slate-600 font-bold mb-2">{item.meaning}</p>
                                <p className="text-sm text-slate-400 italic">"{item.example}"</p>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // ==========================================
        // 工具 3: 學習助手 (Learning Assistant)
        // ==========================================
        function ToolLearning({ onBack }) {
            const [mode, setMode] = useState('qa');
            const [input, setInput] = useState('');
            const [image, setImage] = useState(null);
            const [result, setResult] = useState(null);
            const [loading, setLoading] = useState(false);

            // 清理圖片 Object URL
            useEffect(() => {
                return () => {
                    if (image) URL.revokeObjectURL(image.preview);
                };
            }, [image]);

            const resetState = (newMode) => {
                if (image) URL.revokeObjectURL(image.preview);
                setMode(newMode);
                setResult(null);
                setInput('');
                setImage(null);
            };

            const handleQASubmit = async () => {
                if (!input.trim()) return;
                setLoading(true);
                try {
                    const prompt = `You are Baymax, a helpful learning assistant. Answer clearly. Use Markdown formatting. JSON: { "answer": "String (Markdown)" }`;
                    const data = await callGemini([{ text: input }], prompt);
                    setResult(data);
                } catch (e) { /* 錯誤已在 callGemini 處理 */ }
                setLoading(false);
            };

            const handlePhotoSubmit = async () => {
                if (!image) return;
                setLoading(true);
                try {
                    const imgData = await fileToBase64(image.file);
                    const prompt = `You are Baymax. Solve this problem step-by-step. Use Markdown. JSON: { "solution": "String (Markdown)" }`;
                    const data = await callGemini([
                        { inlineData: { data: imgData, mimeType: image.file.type } },
                        { text: "Solve this" }
                    ], prompt);
                    setResult(data);
                } catch (e) { /* 錯誤已在 callGemini 處理 */ }
                setLoading(false);
            };

            const handleGrammarSubmit = async () => {
                if (!input.trim()) return;
                setLoading(true);
                try {
                    const prompt = `Check grammar. JSON: { "corrected": "String (Markdown)", "explanation": "String (Markdown)" }`;
                    const data = await callGemini([{ text: input }], prompt);
                    setResult(data);
                } catch (e) { /* 錯誤已在 callGemini 處理 */ }
                setLoading(false);
            };

            const handleFile = (e) => {
                const file = e.target.files[0];
                if (file) {
                    if (image) URL.revokeObjectURL(image.preview);
                    setImage({ file, preview: URL.createObjectURL(file) });
                }
            };

            const renderResult = () => {
                if (!result) return null;
                return (
                    <div className="bg-slate-50 p-5 rounded-2xl shadow-inner border-2 border-slate-200 mt-4 animate-fade-in relative overflow-hidden">
                        <div className="absolute inset-0 pointer-events-none opacity-5 bg-[linear-gradient(rgba(18,16,16,0)_50%,rgba(0,0,0,0.25)_50%),linear-gradient(90deg,rgba(255,0,0,0.06),rgba(0,255,0,0.02),rgba(0,0,255,0.06))] bg-[length:100%_2px,3px_100%]"></div>
                        <div className="markdown-body text-slate-800">
                            {mode === 'qa' && (
                                <div dangerouslySetInnerHTML={{ __html: marked.parse(result.answer || '') }} />
                            )}
                            {mode === 'photo' && (
                                <div dangerouslySetInnerHTML={{ __html: marked.parse(result.solution || '') }} />
                            )}
                            {mode === 'grammar' && (
                                <>
                                    <h4 className="text-sm font-bold text-sky-600 mb-2 font-dot border-b-2 border-sky-200 pb-1 inline-block">
                                        CORRECTED_TEXT_
                                    </h4>
                                    <div
                                        className="bg-white p-3 rounded-lg border border-slate-200 mb-4 font-dot"
                                        dangerouslySetInnerHTML={{ __html: marked.parse(result.corrected || '') }}
                                    />
                                    <h4 className="text-sm font-bold text-sky-600 mb-2 font-dot border-b-2 border-sky-200 pb-1 inline-block">
                                        ANALYSIS_LOG_
                                    </h4>
                                    <div
                                        className="text-sm"
                                        dangerouslySetInnerHTML={{ __html: marked.parse(result.explanation || '') }}
                                    />
                                </>
                            )}
                        </div>
                    </div>
                );
            };

            const modeButtons = [
                { key: 'qa', label: '問答' },
                { key: 'photo', label: '解題' },
                { key: 'grammar', label: '文法' },
            ];

            return (
                <div className="flex flex-col h-full animate-slide-up bg-slate-50 md:rounded-[2.5rem] overflow-hidden pt-safe-top">
                    <PageHeader onBack={onBack} title="學習助手" />

                    {/* 模式切換 */}
                    <div className="px-6 pb-2">
                        <div className="flex bg-white p-1 rounded-2xl shadow-sm border border-slate-100">
                            {modeButtons.map(({ key, label }) => (
                                <button
                                    key={key}
                                    onClick={() => resetState(key)}
                                    className={`flex-1 py-2 rounded-xl text-sm font-bold transition font-dot ${
                                        mode === key
                                            ? 'bg-indigo-100 text-indigo-600'
                                            : 'text-slate-400 hover:text-slate-600'
                                    }`}
                                >
                                    {label}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* 主內容區 */}
                    <div className="flex-1 overflow-y-auto p-6 no-scrollbar pb-safe-bottom">
                        <div className="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 mb-4 transition-all focus-within:ring-2 focus-within:ring-indigo-100">
                            {mode === 'qa' && (
                                <div className="flex gap-2">
                                    <textarea
                                        value={input}
                                        onChange={e => setInput(e.target.value)}
                                        placeholder="輸入問題..."
                                        className="flex-1 bg-transparent resize-none outline-none h-24 placeholder-slate-300 font-dot"
                                    />
                                    <div className="flex flex-col justify-end">
                                        <button
                                            onClick={handleQASubmit}
                                            disabled={loading || !input.trim()}
                                            className="w-10 h-10 bg-indigo-500 rounded-full flex items-center justify-center text-white shadow-lg shadow-indigo-200 disabled:opacity-50 hover:bg-indigo-600 transition"
                                        >
                                            {loading ? <Spinner /> : <Icons.MessageSquare size={18} />}
                                        </button>
                                    </div>
                                </div>
                            )}

                            {mode === 'photo' && (
                                <div className="flex flex-col gap-4">
                                    {image ? (
                                        <div className="relative w-full h-48 rounded-xl overflow-hidden shadow-inner bg-slate-100 border-2 border-dashed border-slate-300">
                                            <img src={image.preview} className="w-full h-full object-contain" />
                                            <button
                                                onClick={() => {
                                                    URL.revokeObjectURL(image.preview);
                                                    setImage(null);
                                                }}
                                                className="absolute top-2 right-2 bg-black/50 text-white rounded-full p-1"
                                            >
                                                <Icons.X size={14} />
                                            </button>
                                        </div>
                                    ) : (
                                        <label className="w-full h-32 border-2 border-dashed border-slate-200 rounded-xl flex flex-col items-center justify-center cursor-pointer hover:bg-slate-50 transition group">
                                            <input type="file" accept="image/*" onChange={handleFile} className="hidden" />
                                            <Icons.Camera className="text-slate-300 mb-2 group-hover:scale-110 transition" />
                                            <span className="text-xs text-slate-400 font-dot">UPLOAD_IMAGE</span>
                                        </label>
                                    )}
                                    <button
                                        onClick={handlePhotoSubmit}
                                        disabled={loading || !image}
                                        className="w-full bg-indigo-500 text-white py-3 rounded-xl font-bold disabled:opacity-50 hover:bg-indigo-600 transition shadow-lg shadow-indigo-200 font-dot"
                                    >
                                        {loading ? "ANALYZING..." : "開始解題"}
                                    </button>
                                </div>
                            )}

                            {mode === 'grammar' && (
                                <div className="flex flex-col gap-3">
                                    <textarea
                                        value={input}
                                        onChange={e => setInput(e.target.value)}
                                        placeholder="Paste text here..."
                                        className="w-full bg-transparent resize-none outline-none h-32 placeholder-slate-300 font-mono text-sm"
                                    />
                                    <div className="flex justify-end">
                                        <button
                                            onClick={handleGrammarSubmit}
                                            disabled={loading || !input.trim()}
                                            className="bg-indigo-500 text-white px-6 py-2 rounded-xl font-bold disabled:opacity-50 hover:bg-indigo-600 transition shadow-lg shadow-indigo-200 flex items-center gap-2 font-dot text-sm"
                                        >
                                            {loading ? "CHECKING..." : <><Icons.PenLine size={16} /> 檢查文法</>}
                                        </button>
                                    </div>
                                </div>
                            )}
                        </div>
                        {renderResult()}
                    </div>
                </div>
            );
        }

        // ==========================================
        // 工具 4: 衣物護理 (Clothing Care)
        // ==========================================
        function ToolClothes({ onBack }) {
            const [step, setStep] = useState('idle');
            const [image, setImage] = useState(null);
            const [result, setResult] = useState(null);
            const [loadingTip, setLoadingTip] = useState("正在讀取標籤...");

            // 清理 Object URL
            useEffect(() => {
                return () => {
                    if (image) URL.revokeObjectURL(image.preview);
                };
            }, [image]);

            useEffect(() => {
                if (step === 'analyzing') {
                    const tips = ["正在辨識洗衣符號...", "分析材質成分..."];
                    let i = 0;
                    const timer = setInterval(() => setLoadingTip(tips[i++ % tips.length]), 2000);
                    return () => clearInterval(timer);
                }
            }, [step]);

            const handleAnalyze = async () => {
                if (!image) return;
                setStep('analyzing');
                try {
                    const imgData = await fileToBase64(image.file);
                    const prompt = `你是大白，請辨識衣物洗標符號與材質。JSON結構: { "garmentType": "String", "materials": ["String"], "careInstructions": [{"icon": "String", "text": "String"}], "baymaxTip": "String" }`;
                    const data = await callGemini([
                        { inlineData: { data: imgData, mimeType: image.file.type } },
                        { text: "分析這個洗標" }
                    ], prompt);
                    setResult(data);
                    setStep('result');
                } catch (e) {
                    alert("掃描失敗");
                    setStep('idle');
                }
            };

            const handleFile = (e) => {
                const file = e.target.files[0];
                if (file) {
                    if (image) URL.revokeObjectURL(image.preview);
                    setImage({ file, preview: URL.createObjectURL(file) });
                }
            };

            return (
                <div className="flex flex-col h-full animate-slide-up bg-slate-50 md:rounded-[2.5rem] overflow-hidden pt-safe-top">
                    <PageHeader onBack={onBack} title="衣物護理" bgClass="bg-slate-900/90" />

                    <div className="flex-1 overflow-y-auto p-6 no-scrollbar pb-safe-bottom">
                        {step === 'idle' && (
                            <div className="space-y-6 h-full flex flex-col">
                                <div className="bg-white rounded-[2rem] p-8 shadow-soft text-center flex-1 flex flex-col justify-center items-center relative overflow-hidden">
                                    {image ? (
                                        <div className="relative w-full h-64 rounded-2xl overflow-hidden shadow-inner mb-4">
                                            <img src={image.preview} className="w-full h-full object-contain bg-slate-100" />
                                            <button
                                                onClick={() => {
                                                    URL.revokeObjectURL(image.preview);
                                                    setImage(null);
                                                }}
                                                className="absolute top-2 right-2 bg-slate-900/50 text-white rounded-full p-2"
                                            >
                                                <Icons.X size={16} />
                                            </button>
                                        </div>
                                    ) : (
                                        <label className="w-full h-64 border-2 border-dashed border-slate-200 rounded-3xl flex flex-col items-center justify-center cursor-pointer hover:bg-slate-50 transition gap-4">
                                            <input type="file" accept="image/*" onChange={handleFile} className="hidden" />
                                            <Icons.Camera size={32} className="text-rose-400" />
                                            <span className="text-slate-400 font-medium">拍攝洗標</span>
                                        </label>
                                    )}
                                </div>
                                <button
                                    onClick={handleAnalyze}
                                    disabled={!image}
                                    className="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold shadow-lg disabled:opacity-30"
                                >
                                    開始解讀
                                </button>
                            </div>
                        )}

                        {step === 'analyzing' && (
                            <div className="h-full flex flex-col items-center justify-center">
                                <Icons.Shirt className="text-rose-400 w-10 h-10 animate-bounce" />
                                <p className="mt-4 text-slate-400">{loadingTip}</p>
                            </div>
                        )}

                        {step === 'result' && result && (
                            <div className="space-y-4 animate-slide-up">
                                <div className="flex justify-center -mb-8 relative z-10">
                                    <div className="w-24 h-24 rounded-2xl overflow-hidden border-4 border-white shadow-lg rotate-3 bg-white">
                                        <img src={image.preview} className="w-full h-full object-cover" />
                                    </div>
                                </div>
                                <div className="bg-white rounded-[2rem] p-6 pt-10 shadow-soft flex flex-col items-center text-center">
                                    <h3 className="text-2xl font-black text-slate-800 mt-2">{result.garmentType}</h3>
                                    <div className="flex gap-2 mt-2">
                                        {result.materials.map((m, i) => (
                                            <span key={i} className="bg-slate-100 text-slate-600 text-xs font-bold px-3 py-1 rounded-full">
                                                {m}
                                            </span>
                                        ))}
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    {result.careInstructions.map((care, i) => (
                                        <div key={i} className="bg-white p-4 rounded-2xl shadow-soft flex flex-col items-center text-center">
                                            <div className="text-4xl mb-2">{care.icon}</div>
                                            <div className="text-sm font-bold text-slate-700">{care.text}</div>
                                        </div>
                                    ))}
                                </div>
                                <div className="bg-slate-800 text-white p-6 rounded-[2rem] relative overflow-hidden">
                                    <p className="text-lg font-medium leading-relaxed">"{result.baymaxTip}"</p>
                                </div>
                                <button onClick={() => setStep('idle')} className="w-full py-4 text-center text-slate-400 font-bold">
                                    掃描下一件
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ==========================================
        // 工具 5: 保險箱 (Password Manager)
        // ==========================================
        function ToolPassword({ onBack }) {
            const [passwords, setPasswords] = useLocalStorage('baymax_passwords', []);
            const [viewMode, setViewMode] = useState('list');
            const [showPass, setShowPass] = useState({});
            const [loading, setLoading] = useState(false);
            const [newEntry, setNewEntry] = useState({ service: '', username: '', password: '', note: '' });

            const togglePass = (id) => setShowPass(p => ({ ...p, [id]: !p[id] }));

            const handleAdd = async () => {
                // [修復] 原本 return alert() 和 setLoading(true) 寫在同一行，
                // 導致 setLoading 永遠會執行
                if (!newEntry.service || !newEntry.password) {
                    return alert("請至少填寫服務名稱與密碼");
                }
                setLoading(true);
                try {
                    const aiData = await callGemini(
                        [{ text: newEntry.service }],
                        `Categorize "${newEntry.service}" (Social/Work/Finance/Entertainment/Shopping/Utility/Other). JSON: { "category": "String" }`
                    );
                    setPasswords(p => [
                        { id: Date.now(), ...newEntry, category: aiData.category || "Other" },
                        ...p
                    ]);
                    setViewMode('list');
                    setNewEntry({ service: '', username: '', password: '', note: '' });
                } catch (e) {
                    // API 失敗時仍儲存，分類預設為 Other
                    setPasswords(p => [
                        { id: Date.now(), ...newEntry, category: "Other" },
                        ...p
                    ]);
                    setViewMode('list');
                }
                setLoading(false);
            };

            const handleDelete = (id) => {
                if (confirm("刪除？")) {
                    setPasswords(p => p.filter(x => x.id !== id));
                }
            };

            const handleExport = () => {
                const text = passwords
                    .map(p => `服務:${p.service}\n帳號:${p.username}\n密碼:${p.password}\n備註:${p.note}\n---`)
                    .join('\n');
                const blob = new Blob([text], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Pass_${new Date().toLocaleDateString()}.txt`;
                a.click();
                URL.revokeObjectURL(url);
            };

            const CategoryBadge = ({ type }) => {
                const colorMap = {
                    "Social": "bg-blue-100 text-blue-600",
                    "Finance": "bg-emerald-100 text-emerald-600",
                    "Work": "bg-slate-200 text-slate-700",
                    "Entertainment": "bg-rose-100 text-rose-600",
                    "Shopping": "bg-orange-100 text-orange-600",
                    "Utility": "bg-purple-100 text-purple-600",
                    "Other": "bg-gray-100 text-gray-500",
                };
                return (
                    <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full ${colorMap[type] || colorMap["Other"]}`}>
                        {type}
                    </span>
                );
            };

            return (
                <div className="flex flex-col h-full animate-slide-up bg-slate-900 text-slate-200 md:rounded-[2.5rem] overflow-hidden pt-safe-top">
                    <div className="flex items-center justify-between p-6 sticky top-0 z-10 bg-slate-900/90 backdrop-blur-md border-b border-slate-800">
                        <div className="flex items-center gap-3">
                            <button onClick={onBack} className="w-10 h-10 bg-slate-800 rounded-full flex items-center justify-center hover:bg-slate-700">
                                <Icons.ChevronLeft className="text-slate-400" />
                            </button>
                            <h2 className="text-xl font-bold text-white">保險箱</h2>
                        </div>
                        {viewMode === 'list' && (
                            <button onClick={handleExport} className="p-2 bg-slate-800 rounded-full text-slate-400 hover:text-white">
                                <Icons.Download size={20} />
                            </button>
                        )}
                    </div>

                    <div className="flex-1 overflow-y-auto p-6 no-scrollbar pb-safe-bottom">
                        {viewMode === 'list' ? (
                            <div className="space-y-4">
                                <button
                                    onClick={() => setViewMode('add')}
                                    className="w-full py-4 border-2 border-dashed border-slate-700 rounded-2xl text-slate-500 hover:text-sky-400 hover:border-sky-500/50 hover:bg-slate-800/50 transition flex items-center justify-center gap-2"
                                >
                                    <Icons.Plus size={20} />
                                    <span>新增密碼</span>
                                </button>

                                {passwords.map((item) => (
                                    <div key={item.id} className="bg-slate-800 p-5 rounded-2xl border border-slate-700 relative group">
                                        <div className="flex justify-between items-start mb-2">
                                            <div>
                                                <h3 className="text-lg font-bold text-white">{item.service}</h3>
                                                <CategoryBadge type={item.category} />
                                            </div>
                                            <button
                                                onClick={() => handleDelete(item.id)}
                                                className="text-slate-600 hover:text-rose-500 p-1"
                                            >
                                                <Icons.Trash2 size={16} />
                                            </button>
                                        </div>
                                        <div className="space-y-2 text-sm mt-3">
                                            {item.username && (
                                                <div className="flex items-center gap-2 text-slate-400">
                                                    <span className="text-xs uppercase tracking-wider opacity-50 w-8">User</span>
                                                    <span className="text-slate-200 select-all">{item.username}</span>
                                                </div>
                                            )}
                                            <div className="flex items-center gap-2 text-slate-400">
                                                <span className="text-xs uppercase tracking-wider opacity-50 w-8">Pass</span>
                                                <span className="text-sky-300 font-mono tracking-wider flex-1">
                                                    {showPass[item.id] ? item.password : "••••••••"}
                                                </span>
                                                <button
                                                    onClick={() => togglePass(item.id)}
                                                    className="text-slate-500 hover:text-white"
                                                >
                                                    {showPass[item.id] ? <Icons.EyeOff size={14} /> : <Icons.Eye size={14} />}
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="space-y-4 animate-fade-in">
                                <div>
                                    <label className="text-xs text-slate-500 uppercase font-bold ml-1">服務名稱</label>
                                    <input
                                        autoFocus
                                        className="w-full bg-slate-800 text-white p-4 rounded-xl mt-1 outline-none focus:ring-2 focus:ring-sky-500"
                                        placeholder="例如: Netflix"
                                        value={newEntry.service}
                                        onChange={e => setNewEntry({ ...newEntry, service: e.target.value })}
                                    />
                                </div>
                                <div>
                                    <label className="text-xs text-slate-500 uppercase font-bold ml-1">帳號</label>
                                    <input
                                        className="w-full bg-slate-800 text-white p-4 rounded-xl mt-1 outline-none focus:ring-2 focus:ring-sky-500"
                                        value={newEntry.username}
                                        onChange={e => setNewEntry({ ...newEntry, username: e.target.value })}
                                    />
                                </div>
                                <div>
                                    <label className="text-xs text-slate-500 uppercase font-bold ml-1">密碼</label>
                                    <input
                                        className="w-full bg-slate-800 text-white p-4 rounded-xl mt-1 outline-none focus:ring-2 focus:ring-sky-500"
                                        value={newEntry.password}
                                        onChange={e => setNewEntry({ ...newEntry, password: e.target.value })}
                                    />
                                </div>
                                <div>
                                    <label className="text-xs text-slate-500 uppercase font-bold ml-1">備註</label>
                                    <input
                                        className="w-full bg-slate-800 text-white p-4 rounded-xl mt-1 outline-none focus:ring-2 focus:ring-sky-500"
                                        value={newEntry.note}
                                        onChange={e => setNewEntry({ ...newEntry, note: e.target.value })}
                                    />
                                </div>
                                <div className="pt-4 flex gap-3">
                                    <button
                                        onClick={() => setViewMode('list')}
                                        className="flex-1 py-4 bg-slate-800 text-slate-400 rounded-xl font-bold"
                                    >
                                        取消
                                    </button>
                                    <button
                                        onClick={handleAdd}
                                        disabled={loading}
                                        className="flex-1 py-4 bg-sky-500 text-white rounded-xl font-bold hover:bg-sky-600 disabled:opacity-50"
                                    >
                                        {loading ? "..." : "儲存"}
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ==========================================
        // 工具 6: 影視庫 (Movie Library)
        // ==========================================
        function ToolMovie({ onBack }) {
            const [movies, setMovies] = useLocalStorage('baymax_movies', []);
            const [viewMode, setViewMode] = useState('list');
            const [selectedId, setSelectedId] = useState(null);
            const [loading, setLoading] = useState(false);
            const [newEntry, setNewEntry] = useState({ title: '', rating: 5 });

            const handleAdd = async () => {
                // [修復] 原本 return alert() 和 setLoading(true) 寫在同一行
                if (!newEntry.title) {
                    return alert("請輸入電影名稱");
                }
                setLoading(true);
                try {
                    const prompt = `Identify the movie/series "${newEntry.title}". JSON structure: { "title": "String", "year": "String", "genre": "String", "director": "String", "plot": "String", "color": "String" }`;
                    const aiData = await callGemini([{ text: newEntry.title }], prompt);
                    const posterUrl = `https://tse1.mm.bing.net/th?q=${encodeURIComponent(aiData.title + " " + aiData.year + " movie poster")}&w=300&h=450&c=7&rs=1&p=0`;
                    const newItem = {
                        id: Date.now(),
                        userRating: newEntry.rating,
                        poster: posterUrl,
                        watchHistory: [],
                        personalReview: "",
                        ...aiData
                    };
                    setMovies(prev => [newItem, ...prev]);
                    setViewMode('list');
                    setNewEntry({ title: '', rating: 5 });
                } catch (e) {
                    alert("找不到這部電影...");
                }
                setLoading(false);
            };

            const handleDelete = (id) => {
                if (confirm("確定要移除這部電影嗎？")) {
                    setMovies(prev => prev.filter(m => m.id !== id));
                    if (selectedId === id) {
                        setSelectedId(null);
                        setViewMode('list');
                    }
                }
            };

            const handleUpdateMovie = (id, updates) => {
                setMovies(prev => prev.map(m => m.id === id ? { ...m, ...updates } : m));
            };

            const activeMovie = movies.find(m => m.id === selectedId);

            // 海報圖片元件（含 fallback）
            const PosterImage = ({ src, alt, color, title, className }) => {
                const [error, setError] = useState(false);
                if (error) {
                    return (
                        <div
                            className={`flex flex-col items-center justify-center text-center p-2 text-white ${className}`}
                            style={{ background: `linear-gradient(to bottom right, ${color}, #1f2937)` }}
                        >
                            <Icons.Film size={32} className="opacity-50 mb-2" />
                            <span className="font-bold text-sm leading-tight line-clamp-3">{title}</span>
                        </div>
                    );
                }
                return <img src={src} alt={alt} onError={() => setError(true)} className={`object-cover ${className}`} />;
            };

            // 電影詳情頁
            const MovieDetail = ({ movie }) => {
                const [plotEdit, setPlotEdit] = useState(movie.plot);
                const [reviewEdit, setReviewEdit] = useState(movie.personalReview || "");
                const [isEditingPlot, setIsEditingPlot] = useState(false);
                const [isEditingReview, setIsEditingReview] = useState(false);
                const [dateInput, setDateInput] = useState('');

                const savePlot = () => {
                    handleUpdateMovie(movie.id, { plot: plotEdit });
                    setIsEditingPlot(false);
                };

                const saveReview = () => {
                    handleUpdateMovie(movie.id, { personalReview: reviewEdit });
                    setIsEditingReview(false);
                };

                const addHistory = (dateStr) => {
                    if (!dateStr) return;
                    const newHistory = [...(movie.watchHistory || []), dateStr].sort().reverse();
                    handleUpdateMovie(movie.id, { watchHistory: newHistory });
                    setDateInput('');
                };

                const removeHistory = (indexToRemove) => {
                    const newHistory = (movie.watchHistory || []).filter((_, idx) => idx !== indexToRemove);
                    handleUpdateMovie(movie.id, { watchHistory: newHistory });
                };

                return (
                    <div className="flex flex-col h-full animate-slide-up bg-slate-900 overflow-y-auto no-scrollbar relative">
                        {/* 頂部海報背景 */}
                        <div className="relative h-64 shrink-0">
                            <div className="absolute inset-0 overflow-hidden">
                                <PosterImage
                                    src={movie.poster} alt={movie.title}
                                    color={movie.color} title={movie.title}
                                    className="w-full h-full opacity-60 blur-md scale-110"
                                />
                                <div className="absolute inset-0 bg-gradient-to-b from-transparent via-slate-900/50 to-slate-900"></div>
                            </div>
                            <div className="absolute top-0 left-0 p-6 w-full flex justify-between items-start z-10">
                                <button
                                    onClick={() => { setViewMode('list'); setSelectedId(null); }}
                                    className="w-10 h-10 bg-black/30 backdrop-blur-md rounded-full flex items-center justify-center hover:bg-white/20 text-white transition"
                                >
                                    <Icons.ChevronLeft />
                                </button>
                                <button
                                    onClick={() => handleDelete(movie.id)}
                                    className="w-10 h-10 bg-black/30 backdrop-blur-md rounded-full flex items-center justify-center hover:bg-rose-500/80 text-white transition"
                                >
                                    <Icons.Trash2 size={18} />
                                </button>
                            </div>
                            <div className="absolute -bottom-10 left-6 flex items-end gap-4 z-10">
                                <div className="w-28 h-40 rounded-xl overflow-hidden shadow-2xl border-2 border-white/10 bg-slate-800">
                                    <PosterImage src={movie.poster} alt={movie.title} color={movie.color} title={movie.title} className="w-full h-full" />
                                </div>
                            </div>
                        </div>

                        {/* 電影資訊 */}
                        <div className="px-6 pt-12 pb-20">
                            <h2 className="text-2xl font-bold text-white leading-tight">{movie.title}</h2>
                            <div className="flex gap-2 text-xs text-slate-400 mt-2 font-medium">
                                <span className="bg-white/10 px-2 py-0.5 rounded">{movie.year}</span>
                                <span className="bg-white/10 px-2 py-0.5 rounded">{movie.genre.split(',')[0]}</span>
                                <span>{movie.director}</span>
                            </div>

                            {/* 評分 */}
                            <div className="flex gap-1 my-4 bg-white/5 inline-flex p-2 rounded-xl">
                                {[1, 2, 3, 4, 5].map((star) => (
                                    <button
                                        key={star}
                                        onClick={() => handleUpdateMovie(movie.id, { userRating: star })}
                                        className={`${movie.userRating >= star ? 'text-amber-400' : 'text-slate-600'} hover:scale-110 transition`}
                                    >
                                        <Icons.Star size={20} />
                                    </button>
                                ))}
                            </div>

                            {/* 劇情簡介 */}
                            <div className="mb-6 group relative">
                                <div className="flex justify-between items-center mb-1">
                                    <label className="text-xs font-bold text-slate-500 uppercase">劇情簡介</label>
                                    <button onClick={() => setIsEditingPlot(!isEditingPlot)} className="text-sky-400 hover:text-white p-1">
                                        <Icons.Edit3 size={12} />
                                    </button>
                                </div>
                                {isEditingPlot ? (
                                    <div>
                                        <textarea
                                            className="w-full bg-slate-800 text-slate-300 p-3 rounded-xl outline-none focus:ring-1 focus:ring-sky-500 text-sm leading-relaxed"
                                            rows="4"
                                            value={plotEdit}
                                            onChange={e => setPlotEdit(e.target.value)}
                                        />
                                        <button onClick={savePlot} className="mt-2 bg-sky-500 text-white text-xs px-3 py-1 rounded-lg">
                                            儲存
                                        </button>
                                    </div>
                                ) : (
                                    <p className="text-slate-300 text-sm leading-relaxed">{movie.plot}</p>
                                )}
                            </div>

                            {/* 觀後感 */}
                            <div className="mb-6 group relative">
                                <div className="flex justify-between items-center mb-1">
                                    <label className="text-xs font-bold text-slate-500 uppercase">觀後感</label>
                                    <button onClick={() => setIsEditingReview(!isEditingReview)} className="text-sky-400 hover:text-white p-1">
                                        <Icons.Edit3 size={12} />
                                    </button>
                                </div>
                                {isEditingReview || !movie.personalReview ? (
                                    <div className="bg-slate-800/30 p-2 rounded-xl border border-white/5">
                                        <textarea
                                            className="w-full bg-transparent text-slate-300 p-2 outline-none text-sm leading-relaxed placeholder-slate-600"
                                            rows="3"
                                            placeholder="寫下你的想法..."
                                            value={reviewEdit}
                                            onChange={e => setReviewEdit(e.target.value)}
                                        />
                                        <div className="flex justify-end mt-1">
                                            <button onClick={saveReview} className="bg-sky-600 text-white text-xs px-3 py-1.5 rounded-lg hover:bg-sky-500 transition">
                                                儲存心得
                                            </button>
                                        </div>
                                    </div>
                                ) : (
                                    <div
                                        onClick={() => setIsEditingReview(true)}
                                        className="cursor-pointer hover:bg-white/5 p-2 -ml-2 rounded-lg transition"
                                    >
                                        <p className="text-slate-200 text-sm leading-relaxed whitespace-pre-wrap">
                                            {movie.personalReview}
                                        </p>
                                    </div>
                                )}
                            </div>

                            {/* 觀影日記 */}
                            <div className="bg-slate-800/50 rounded-2xl p-4 border border-white/5">
                                <div className="flex justify-between items-center mb-4">
                                    <div className="flex items-center gap-2 text-white font-bold">
                                        <Icons.Calendar size={18} className="text-amber-400" />
                                        觀影日記
                                        <span className="bg-amber-500/20 text-amber-400 text-[10px] px-2 py-0.5 rounded-full">
                                            {movie.watchHistory?.length || 0} 刷
                                        </span>
                                    </div>
                                </div>

                                <div className="flex gap-2 mb-4 items-stretch">
                                    <button
                                        onClick={() => addHistory(new Date().toISOString().split('T')[0])}
                                        className="bg-amber-500 hover:bg-amber-600 text-white text-xs font-bold px-4 py-2 rounded-xl transition shadow-lg shadow-amber-500/20 whitespace-nowrap flex items-center"
                                    >
                                        + 今天
                                    </button>
                                    <div className="flex-1 flex gap-2 bg-slate-700 rounded-xl px-2 py-1 items-center border border-slate-600 focus-within:border-sky-500 transition">
                                        <input
                                            type="date"
                                            value={dateInput}
                                            onChange={e => setDateInput(e.target.value)}
                                            className="bg-transparent text-slate-200 text-xs w-full outline-none"
                                        />
                                        <button
                                            onClick={() => addHistory(dateInput)}
                                            disabled={!dateInput}
                                            className="text-amber-400 font-bold text-xs px-2 py-1 rounded disabled:opacity-30 hover:bg-slate-600 hover:text-amber-300 transition whitespace-nowrap"
                                        >
                                            補登
                                        </button>
                                    </div>
                                </div>

                                <div className="space-y-2 max-h-40 overflow-y-auto pr-1 custom-scrollbar">
                                    {(movie.watchHistory || []).map((date, idx) => (
                                        <div key={idx} className="flex justify-between items-center bg-slate-900/50 p-2.5 rounded-lg text-sm group border border-transparent hover:border-slate-700 transition">
                                            <span className="text-slate-300 font-mono pl-1">{date}</span>
                                            <button
                                                onClick={() => removeHistory(idx)}
                                                className="text-slate-600 hover:text-rose-500 p-1 opacity-0 group-hover:opacity-100 transition"
                                            >
                                                <Icons.X size={14} />
                                            </button>
                                        </div>
                                    ))}
                                    {(!movie.watchHistory || movie.watchHistory.length === 0) && (
                                        <p className="text-center text-xs text-slate-600 py-2">還沒有觀影紀錄</p>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            // 詳情頁
            if (viewMode === 'detail' && activeMovie) {
                return <MovieDetail movie={activeMovie} />;
            }

            // 列表頁 / 新增頁
            return (
                <div className="flex flex-col h-full animate-slide-up bg-slate-900 text-slate-200 md:rounded-[2.5rem] overflow-hidden pt-safe-top">
                    <div className="flex items-center justify-between p-6 sticky top-0 z-10 bg-slate-900/90 backdrop-blur-md border-b border-slate-800">
                        <div className="flex items-center gap-3">
                            <button onClick={onBack} className="w-10 h-10 bg-slate-800 rounded-full flex items-center justify-center hover:bg-slate-700">
                                <Icons.ChevronLeft className="text-slate-400" />
                            </button>
                            <h2 className="text-xl font-bold text-white">影視庫</h2>
                        </div>
                        {viewMode === 'list' && (
                            <button
                                onClick={() => setViewMode('add')}
