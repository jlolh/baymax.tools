        // ==========================================
        // 工具 7: 專注模式 (Pomodoro Timer)
        // ==========================================
        function ToolPomodoro({ onBack }) {
            const [workMinutes, setWorkMinutes] = useState(25);
            const [breakMinutes, setBreakMinutes] = useState(5);
            const [timeLeft, setTimeLeft] = useState(25 * 60);
            const [isActive, setIsActive] = useState(false);
            const [mode, setMode] = useState('work');
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);

            // [修復] 加入 mode 到依賴陣列，原本只在非計時時重設時間
            useEffect(() => {
                if (!isActive) {
                    setTimeLeft(mode === 'work' ? workMinutes * 60 : breakMinutes * 60);
                }
            }, [workMinutes, breakMinutes, mode, isActive]);

            // 語音合成
            const speak = useCallback((text) => {
                if (!('speechSynthesis' in window)) return;

                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-TW';
                utterance.rate = 0.8;
                utterance.pitch = 0.6;

                const voices = window.speechSynthesis.getVoices();
                const maleVoice = voices.find(v =>
                    v.lang.includes('zh') && (v.name.includes('Male') || v.name.includes('Zhiwei'))
                );
                const googleVoice = voices.find(v =>
                    v.name.includes("Google") && v.lang.includes("zh")
                );

                if (maleVoice) {
                    utterance.voice = maleVoice;
                    utterance.pitch = 0.9;
                } else if (googleVoice) {
                    utterance.voice = googleVoice;
                    utterance.pitch = 0.6;
                }

                window.speechSynthesis.speak(utterance);
            }, []);

            // 計時器完成
            const handleTimerComplete = useCallback(() => {
                if (mode === 'work') {
                    speak("專注時間結束。為了你的健康，大白建議你休息一下。");
                    setMode('break');
                    setTimeLeft(breakMinutes * 60);
                } else {
                    speak("休息結束。你準備好繼續工作了嗎？");
                    setMode('work');
                    setTimeLeft(workMinutes * 60);
                }
            }, [mode, workMinutes, breakMinutes, speak]);

            // 計時器邏輯
            useEffect(() => {
                let interval = null;
                if (isActive && timeLeft > 0) {
                    interval = setInterval(() => setTimeLeft(t => t - 1), 1000);
                } else if (timeLeft === 0) {
                    setIsActive(false);
                    handleTimerComplete();
                }
                return () => clearInterval(interval);
            }, [isActive, timeLeft, handleTimerComplete]);

            const handleStart = () => {
                setIsActive(!isActive);
                if (!isActive) {
                    if (mode === 'work') {
                        speak("你好，我是大白。專注模式啟動。我會在這裡陪伴你。");
                    } else {
                        speak("休息模式啟動。請放鬆身心。");
                    }
                }
            };

            const handleReset = () => {
                setIsActive(false);
                setTimeLeft(mode === 'work' ? workMinutes * 60 : breakMinutes * 60);
            };

            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            };

            return (
                <div className="flex flex-col h-full animate-slide-up bg-slate-50 md:rounded-[2.5rem] overflow-hidden pt-safe-top">
                    <div className="flex items-center justify-between p-6 sticky top-0 z-10 bg-slate-50/90 backdrop-blur-md">
                        <div className="flex items-center gap-3">
                            <button onClick={onBack} className="w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-sm">
                                <Icons.ChevronLeft className="text-slate-600" />
                            </button>
                            <h2 className="text-xl font-bold text-slate-700">專注模式</h2>
                        </div>
                        <button
                            onClick={() => !isActive && setIsSettingsOpen(!isSettingsOpen)}
                            className={`w-10 h-10 rounded-full flex items-center justify-center shadow-sm transition ${
                                isActive
                                    ? 'bg-slate-100 text-slate-300 cursor-not-allowed'
                                    : 'bg-white text-slate-600 hover:text-sky-500'
                            }`}
                        >
                            <Icons.Settings size={20} />
                        </button>
                    </div>

                    <div className="flex-1 flex flex-col items-center justify-center p-6 pb-safe-bottom relative">
                        {/* 設定面板 */}
                        {isSettingsOpen && !isActive && (
                            <div className="absolute inset-0 bg-white/95 backdrop-blur-sm z-20 flex flex-col items-center justify-center p-8 animate-fade-in">
                                <h3 className="text-lg font-bold text-slate-700 mb-6">設定時間 (分鐘)</h3>
                                <div className="w-full space-y-6">
                                    <div>
                                        <label className="text-xs font-bold text-slate-400 uppercase mb-2 block">專注時間</label>
                                        <div className="flex items-center gap-4">
                                            <input
                                                type="range" min="1" max="90" step="1"
                                                value={workMinutes}
                                                onChange={e => setWorkMinutes(Number(e.target.value))}
                                                className="flex-1 accent-slate-800"
                                            />
                                            <span className="text-xl font-mono font-bold text-slate-800 w-12 text-right">
                                                {workMinutes}
                                            </span>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-slate-400 uppercase mb-2 block">休息時間</label>
                                        <div className="flex items-center gap-4">
                                            <input
                                                type="range" min="1" max="30" step="1"
                                                value={breakMinutes}
                                                onChange={e => setBreakMinutes(Number(e.target.value))}
                                                className="flex-1 accent-rose-500"
                                            />
                                            <span className="text-xl font-mono font-bold text-rose-500 w-12 text-right">
                                                {breakMinutes}
                                            </span>
                                        </div>
                                    </div>
                                </div>
                                <button
                                    onClick={() => setIsSettingsOpen(false)}
                                    className="mt-8 px-8 py-3 bg-slate-800 text-white rounded-xl font-bold shadow-lg hover:bg-slate-700 transition"
                                >
                                    完成設定
                                </button>
                            </div>
                        )}

                        {/* 大白動畫 */}
                        <div className="mb-8 relative">
                            <div className={`absolute inset-0 bg-sky-200 blur-3xl opacity-20 rounded-full transition-all duration-1000 ${
                                isActive ? 'scale-125' : 'scale-100'
                            }`}></div>
                            <FullBodyBaymax />
                        </div>

                        {/* 計時器顯示 */}
                        <div className="text-center mb-8">
                            <h3 className="text-sm font-bold text-slate-400 uppercase tracking-widest mb-2">
                                {mode === 'work' ? 'FOCUS TIME' : 'RELAX TIME'}
                            </h3>
                            <div className="text-6xl font-mono font-bold text-slate-800 tracking-tighter">
                                {formatTime(timeLeft)}
                            </div>
                        </div>

                        {/* 控制按鈕 */}
                        <div className="flex gap-4 w-full max-w-xs">
                            <button
                                onClick={handleStart}
                                className={`flex-1 py-4 rounded-2xl font-bold text-white shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2 ${
                                    isActive
                                        ? 'bg-rose-500 shadow-rose-200'
                                        : 'bg-slate-800 shadow-slate-300'
                                }`}
                            >
                                {isActive ? <Icons.Pause /> : <Icons.Play />}
                                {isActive ? "暫停" : "開始"}
                            </button>
                            <button
                                onClick={handleReset}
                                className="w-16 bg-white rounded-2xl flex items-center justify-center text-slate-400 hover:text-slate-600 shadow-sm border border-slate-200 active:scale-95 transition"
                            >
                                <Icons.RotateCcw size={20} />
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 工具 8: 食譜助手 (Recipe Helper)
        // ==========================================
        function ToolRecipe({ onBack }) {
            const [step, setStep] = useState('idle');
            const [images, setImages] = useState([]);
            const [textInput, setTextInput] = useState('');
            const [result, setResult] = useState(null);
            const [loadingTip, setLoadingTip] = useState("辨識食材中...");

            useEffect(() => {
                return () => images.forEach(img => URL.revokeObjectURL(img.preview));
            }, [images]);

            useEffect(() => {
                if (step === 'analyzing') {
                    const tips = ["辨識食材中...", "大白正在想菜色...", "搜尋最佳配方..."];
                    let i = 0;
                    const id = setInterval(() => setLoadingTip(tips[i++ % tips.length]), 2000);
                    return () => clearInterval(id);
                }
            }, [step]);

            const handleAnalyze = async () => {
                if (!images.length && !textInput.trim()) return;
                setStep('analyzing');
                try {
                    const parts = [];
                    if (images.length) {
                        const imgParts = await Promise.all(
                            images.map(async (img) => ({
                                inlineData: { data: await fileToBase64(img.file), mimeType: img.file.type }
                            }))
                        );
                        parts.push(...imgParts);
                    }
                    const userText = textInput.trim()
                        ? `這些是我有的食材: ${textInput}。請推薦菜色。`
                        : "請辨識圖中的食材，並推薦可做的菜色。";
                    parts.push({ text: userText });

                    const prompt = `你是大白，一個貼心的烹飪助手。根據使用者提供的食材（圖片或文字），推薦 2-3 道容易製作的菜色。
JSON結構: { "ingredients": ["String"], "recipes": [{ "name": "String", "difficulty": "簡單|中等|進階", "time": "String", "steps": ["String"], "tip": "String" }] }`;
                    const data = await callGemini(parts, prompt);
                    setResult(data);
                    setStep('result');
                } catch (e) {
                    alert("分析失敗，請重試");
                    setStep('idle');
                }
            };

            const handleFile = (e) => {
                if (e.target.files.length) {
                    const newImgs = Array.from(e.target.files).map(f => ({
                        file: f, preview: URL.createObjectURL(f)
                    }));
                    setImages(prev => [...prev, ...newImgs]);
                }
            };

            const removeImage = (index) => {
                setImages(prev => {
                    URL.revokeObjectURL(prev[index].preview);
                    return prev.filter((_, i) => i !== index);
                });
            };

            const difficultyColor = (d) => {
                if (d === '簡單') return 'bg-emerald-100 text-emerald-600';
                if (d === '進階') return 'bg-rose-100 text-rose-600';
                return 'bg-amber-100 text-amber-600';
            };

            return (
                <div className="flex flex-col h-full animate-slide-up bg-slate-50 md:rounded-[2.5rem] overflow-hidden pt-safe-top">
                    <PageHeader onBack={onBack} title="食譜助手" />
                    <div className="flex-1 overflow-y-auto p-6 no-scrollbar pb-safe-bottom">
                        {step === 'idle' && (
                            <div className="space-y-4 flex flex-col h-full">
                                <div className="bg-white rounded-[2rem] p-6 shadow-soft flex-1">
                                    <p className="text-sm text-slate-400 mb-3 font-dot">拍攝食材或輸入名稱，大白幫你想菜色</p>
                                    <div className="grid grid-cols-3 gap-2 mb-4">
                                        {images.map((img, i) => (
                                            <div key={i} className="relative aspect-square rounded-xl overflow-hidden shadow-inner">
                                                <img src={img.preview} className="w-full h-full object-cover" />
                                                <button onClick={() => removeImage(i)} className="absolute top-1 right-1 bg-black/50 text-white rounded-full p-0.5">
                                                    <Icons.X size={10} />
                                                </button>
                                            </div>
                                        ))}
                                        <label className="aspect-square flex flex-col items-center justify-center bg-slate-50 rounded-xl cursor-pointer hover:bg-slate-100 transition border-2 border-dashed border-slate-200">
                                            <input type="file" multiple accept="image/*" onChange={handleFile} className="hidden" />
                                            <Icons.Camera className="text-slate-300" size={20} />
                                            <span className="text-[10px] text-slate-300 mt-1">拍食材</span>
                                        </label>
                                    </div>
                                    <div className="flex items-center gap-2 text-xs text-slate-300 mb-2">
                                        <div className="flex-1 h-px bg-slate-100"></div>
                                        <span>或直接輸入</span>
                                        <div className="flex-1 h-px bg-slate-100"></div>
                                    </div>
                                    <textarea
                                        value={textInput}
                                        onChange={e => setTextInput(e.target.value)}
                                        placeholder="例如：雞蛋、番茄、洋蔥..."
                                        className="w-full bg-slate-50 rounded-xl p-3 outline-none resize-none h-20 text-sm placeholder-slate-300 focus:ring-2 focus:ring-orange-100 transition"
                                    />
                                </div>
                                <button
                                    onClick={handleAnalyze}
                                    disabled={!images.length && !textInput.trim()}
                                    className="w-full bg-orange-500 text-white py-4 rounded-2xl font-bold shadow-lg shadow-orange-200 disabled:opacity-40 hover:bg-orange-600 transition"
                                >
                                    讓大白推薦菜色
                                </button>
                            </div>
                        )}

                        {step === 'analyzing' && (
                            <div className="h-full flex flex-col items-center justify-center">
                                <Icons.UtensilsCrossed className="text-orange-400 w-10 h-10 animate-bounce" />
                                <p className="mt-4 text-slate-400">{loadingTip}</p>
                            </div>
                        )}

                        {step === 'result' && result && (
                            <div className="space-y-4 animate-slide-up">
                                {/* 食材清單 */}
                                <div className="bg-white rounded-[2rem] p-5 shadow-soft">
                                    <h3 className="text-sm font-bold text-slate-400 mb-2">辨識到的食材</h3>
                                    <div className="flex flex-wrap gap-2">
                                        {(result.ingredients || []).map((item, i) => (
                                            <span key={i} className="bg-orange-50 text-orange-600 text-xs font-bold px-3 py-1 rounded-full">
                                                {item}
                                            </span>
                                        ))}
                                    </div>
                                </div>

                                {/* 推薦菜色 */}
                                {(result.recipes || []).map((recipe, i) => (
                                    <div key={i} className="bg-white rounded-[2rem] p-5 shadow-soft">
                                        <div className="flex justify-between items-start mb-3">
                                            <h3 className="text-xl font-black text-slate-800">{recipe.name}</h3>
                                            <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full ${difficultyColor(recipe.difficulty)}`}>
                                                {recipe.difficulty}
                                            </span>
                                        </div>
                                        <p className="text-xs text-slate-400 mb-3">⏱ {recipe.time}</p>
                                        <ol className="space-y-2 mb-3">
                                            {recipe.steps.map((s, j) => (
                                                <li key={j} className="flex gap-2 text-sm text-slate-600">
                                                    <span className="w-5 h-5 bg-orange-100 text-orange-500 rounded-full flex items-center justify-center text-xs font-bold shrink-0 mt-0.5">
                                                        {j + 1}
                                                    </span>
                                                    {s}
                                                </li>
                                            ))}
                                        </ol>
                                        {recipe.tip && (
                                            <div className="bg-slate-50 p-3 rounded-xl text-xs text-slate-500">
                                                💡 大白提醒：{recipe.tip}
                                            </div>
                                        )}
                                    </div>
                                ))}

                                <button onClick={() => { setStep('idle'); setImages([]); setTextInput(''); setResult(null); }}
                                    className="w-full py-4 text-slate-400 font-bold">
                                    再試其他食材
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ==========================================
        // 工具 9: 習慣追蹤 (Habit Tracker)
        // ==========================================
        function ToolHabit({ onBack }) {
            const [habits, setHabits] = useLocalStorage('baymax_habits', []);
            const [showAdd, setShowAdd] = useState(false);
            const [newName, setNewName] = useState('');
            const [newIcon, setNewIcon] = useState('💧');

            const today = new Date().toISOString().split('T')[0];

            const presetIcons = ['💧', '🏃', '📖', '🧘', '💊', '🥗', '😴', '✍️', '🎵', '🧹'];

            const addHabit = () => {
                if (!newName.trim()) return;
                setHabits(prev => [...prev, {
                    id: Date.now(),
                    name: newName.trim(),
                    icon: newIcon,
                    records: [],
                    createdAt: today,
                }]);
                setNewName('');
                setNewIcon('💧');
                setShowAdd(false);
            };

            const toggleToday = (habitId) => {
                setHabits(prev => prev.map(h => {
                    if (h.id !== habitId) return h;
                    const hasToday = h.records.includes(today);
                    return {
                        ...h,
                        records: hasToday
                            ? h.records.filter(d => d !== today)
                            : [...h.records, today]
                    };
                }));
            };

            const deleteHabit = (id) => {
                if (confirm("確定刪除這個習慣？")) {
                    setHabits(prev => prev.filter(h => h.id !== id));
                }
            };

            const getStreak = (records) => {
                if (!records.length) return 0;
                const sorted = [...records].sort().reverse();
                let streak = 0;
                const d = new Date();
                for (let i = 0; i < 365; i++) {
                    const dateStr = d.toISOString().split('T')[0];
                    if (sorted.includes(dateStr)) {
                        streak++;
                    } else if (i > 0) {
                        break;
                    }
                    d.setDate(d.getDate() - 1);
                }
                return streak;
            };

            // 最近 7 天
            const last7Days = Array.from({ length: 7 }, (_, i) => {
                const d = new Date();
                d.setDate(d.getDate() - (6 - i));
                return {
                    date: d.toISOString().split('T')[0],
                    label: ['日', '一', '二', '三', '四', '五', '六'][d.getDay()],
                    isToday: d.toISOString().split('T')[0] === today,
                };
            });

            return (
                <div className="flex flex-col h-full animate-slide-up bg-slate-50 md:rounded-[2.5rem] overflow-hidden pt-safe-top">
                    <PageHeader onBack={onBack} title="習慣追蹤">
                        <button
                            onClick={() => setShowAdd(!showAdd)}
                            className="w-10 h-10 bg-emerald-500 rounded-full flex items-center justify-center text-white shadow-lg shadow-emerald-200 hover:scale-105 active:scale-95 transition"
                        >
                            <Icons.Plus size={20} />
                        </button>
                    </PageHeader>

                    <div className="flex-1 overflow-y-auto p-6 no-scrollbar pb-safe-bottom">
                        {/* 新增習慣面板 */}
                        {showAdd && (
                            <div className="bg-white rounded-[2rem] p-5 shadow-soft mb-4 animate-fade-in">
                                <h3 className="text-sm font-bold text-slate-400 mb-3">新增習慣</h3>
                                <div className="flex flex-wrap gap-2 mb-3">

                                            {icon}

                                <p className="text-slate-400">還沒有習慣，點右上角 + 開始</p>

                                        <button
                                            onClick={() => deleteHabit(habit.id)}

                                            <Icons.Trash2 size={14} />

                                        <div className="flex items-center gap-3 mb-3">
                                            <button

                                                    doneToday
                                                        ? 'bg-emerald-100 ring-2 ring-emerald-400 shadow-lg shadow-emerald-100'
                                                        : 'bg-slate-50 hover:bg-slate-100'

                                            >
                                                {doneToday ? '✅' : habit.icon}
                                            </button>
                                            <div className="flex-1">
                                                <div className="font-bold text-slate-700">{habit.name}</div>
                                                <div className="text-xs text-slate-400">
                                                    {streak > 0
                                                        ? `🔥 連續 ${streak} 天`
                                                        : '今天開始吧！'

                                                </div>
                                            </div>
                                        </div>

                                        {/* 最近 7 天格子 */}
                                        <div className="flex gap-1.5">
                                            {last7Days.map(day => {
                                                const done = habit.records.includes(day.date);
                                                return (
                                                    <div key={day.date} className="flex-1 flex flex-col items-center gap-1">
                                                        <div className={`w-full aspect-square rounded-lg flex items-center justify-center text-xs font-bold transition ${
                                                            done
                                                                ? 'bg-emerald-400 text-white'
                                                                : day.isToday
                                                                    ? 'bg-slate-100 text-slate-400 ring-1 ring-slate-300'
                                                                    : 'bg-slate-50 text-slate-200'

                                                            {done ? '✓' : ''}
