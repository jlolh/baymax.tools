        // ==========================================
        // 工具 10: 記帳本 (Expense Tracker)
        // ==========================================
        function ToolExpense({ onBack }) {
            const [records, setRecords] = useLocalStorage('baymax_expenses', []);
            const [viewMode, setViewMode] = useState('list');
            const [newEntry, setNewEntry] = useState({ item: '', amount: '', category: '' });
            const [loading, setLoading] = useState(false);

            const categoryConfig = {
                '餐飲': { color: 'bg-orange-100 text-orange-600', icon: '🍔' },
                '交通': { color: 'bg-blue-100 text-blue-600', icon: '🚌' },
                '娛樂': { color: 'bg-purple-100 text-purple-600', icon: '🎮' },
                '購物': { color: 'bg-pink-100 text-pink-600', icon: '🛍️' },
                '醫療': { color: 'bg-red-100 text-red-600', icon: '💊' },
                '教育': { color: 'bg-indigo-100 text-indigo-600', icon: '📚' },
                '日用': { color: 'bg-teal-100 text-teal-600', icon: '🏠' },
                '其他': { color: 'bg-gray-100 text-gray-500', icon: '📌' },
            };

            const handleAdd = async () => {
                if (!newEntry.item || !newEntry.amount) {
                    return alert("請填寫項目和金額");
                }
                setLoading(true);
                let category = newEntry.category;
                if (!category) {
                    try {
                        const aiData = await callGemini(
                            [{ text: newEntry.item }],
                            `將消費項目 "${newEntry.item}" 分類為以下其中一個: 餐飲/交通/娛樂/購物/醫療/教育/日用/其他。JSON: { "category": "String" }`
                        );
                        category = aiData.category || '其他';
                    } catch (e) {
                        category = '其他';
                    }
                }
                setRecords(prev => [{
                    id: Date.now(),
                    item: newEntry.item,
                    amount: parseFloat(newEntry.amount),
                    category,
                    date: new Date().toISOString().split('T')[0],
                }, ...prev]);
                setNewEntry({ item: '', amount: '', category: '' });
                setViewMode('list');
                setLoading(false);
            };

            const handleDelete = (id) => {
                if (confirm("刪除此筆記錄？")) {
                    setRecords(prev => prev.filter(r => r.id !== id));
                }
            };

            // 本月統計
            const thisMonth = new Date().toISOString().slice(0, 7);
            const monthRecords = records.filter(r => r.date?.startsWith(thisMonth));
            const monthTotal = monthRecords.reduce((sum, r) => sum + (r.amount || 0), 0);

            // 分類統計
            const categoryTotals = {};
            monthRecords.forEach(r => {
                const cat = r.category || '其他';
                categoryTotals[cat] = (categoryTotals[cat] || 0) + (r.amount || 0);
            });
            const sortedCategories = Object.entries(categoryTotals).sort((a, b) => b[1] - a[1]);

            return (
                <div className="flex flex-col h-full animate-slide-up bg-slate-50 md:rounded-[2.5rem] overflow-hidden pt-safe-top">
                    <PageHeader onBack={onBack} title="記帳本">
                        {viewMode === 'list' && (
                            <button
                                onClick={() => setViewMode('add')}
                                className="w-10 h-10 bg-teal-500 rounded-full flex items-center justify-center text-white shadow-lg shadow-teal-200 hover:scale-105 active:scale-95 transition"
                            >
                                <Icons.Plus size={20} />
                            </button>
                        )}
                    </PageHeader>

                    <div className="flex-1 overflow-y-auto p-6 no-scrollbar pb-safe-bottom">
                        {viewMode === 'list' ? (
                            <div className="space-y-4">
                                {/* 本月總覽 */}
                                <div className="bg-white rounded-[2rem] p-5 shadow-soft">
                                    <h3 className="text-xs font-bold text-slate-400 mb-1">本月支出</h3>
                                    <div className="text-3xl font-black text-slate-800">${monthTotal.toLocaleString()}</div>

                                    {sortedCategories.length > 0 && (
                                        <div className="mt-4 space-y-2">
                                            {sortedCategories.map(([cat, total]) => {
                                                const cfg = categoryConfig[cat] || categoryConfig['其他'];
                                                const pct = monthTotal > 0 ? Math.round((total / monthTotal) * 100) : 0;
                                                return (
                                                    <div key={cat} className="flex items-center gap-2">
                                                        <span className="text-sm">{cfg.icon}</span>
                                                        <span className="text-xs text-slate-500 w-10">{cat}</span>
                                                        <div className="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden">
                                                            <div
                                                                className="h-full bg-teal-400 rounded-full transition-all duration-500"
                                                                style={{ width: `${pct}%` }}
                                                            ></div>
                                                        </div>
                                                        <span className="text-xs text-slate-400 w-16 text-right">${total.toLocaleString()}</span>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    )}
                                </div>

                                {/* 記錄列表 */}
                                {records.length === 0 && (
                                    <div className="text-center py-16 text-slate-300">
                                        <Icons.Wallet size={48} className="mx-auto mb-4 opacity-30" />
                                        <p className="text-slate-400">還沒有記錄，點右上角 + 開始記帳</p>
                                    </div>
                                )}
                                {records.map(item => {
                                    const cfg = categoryConfig[item.category] || categoryConfig['其他'];
                                    return (
                                        <div key={item.id} className="bg-white rounded-2xl p-4 shadow-soft flex items-center gap-3 group">
                                            <div className={`w-10 h-10 rounded-xl flex items-center justify-center text-lg ${cfg.color}`}>
                                                {cfg.icon}
                                            </div>
                                            <div className="flex-1 min-w-0">
                                                <div className="font-bold text-slate-700 truncate">{item.item}</div>
                                                <div className="text-xs text-slate-400">{item.date}</div>
                                            </div>
                                            <div className="text-right">
                                                <div className="font-bold text-slate-800">${item.amount?.toLocaleString()}</div>
                                                <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded-full ${cfg.color}`}>
                                                    {item.category}
                                                </span>
                                            </div>
                                            <button
                                                onClick={() => handleDelete(item.id)}
                                                className="text-slate-200 hover:text-rose-500 transition opacity-0 group-hover:opacity-100 ml-1"
                                            >
                                                <Icons.Trash2 size={14} />
                                            </button>
                                        </div>
                                    );
                                })}
                            </div>
                        ) : (
                            <div className="space-y-4 animate-fade-in">
                                <div className="bg-white rounded-[2rem] p-6 shadow-soft">
                                    <h3 className="text-lg font-bold text-slate-700 mb-4">新增支出</h3>
                                    <div className="space-y-3">
                                        <div>
                                            <label className="text-xs text-slate-400 font-bold ml-1">項目</label>
                                            <input
                                                autoFocus
                                                value={newEntry.item}
                                                onChange={e => setNewEntry({ ...newEntry, item: e.target.value })}
                                                placeholder="例如：午餐便當"
                                                className="w-full bg-slate-50 p-3 rounded-xl mt-1 outline-none focus:ring-2 focus:ring-teal-100 text-sm"
                                            />
                                        </div>
                                        <div>
                                            <label className="text-xs text-slate-400 font-bold ml-1">金額</label>
                                            <input
                                                type="number"
                                                value={newEntry.amount}
                                                onChange={e => setNewEntry({ ...newEntry, amount: e.target.value })}
                                                placeholder="0"
                                                className="w-full bg-slate-50 p-3 rounded-xl mt-1 outline-none focus:ring-2 focus:ring-teal-100 text-sm"
                                            />
                                        </div>
                                        <div>
                                            <label className="text-xs text-slate-400 font-bold ml-1 mb-2 block">分類 (留空自動判斷)</label>
                                            <div className="flex flex-wrap gap-2">
                                                {Object.entries(categoryConfig).map(([cat, cfg]) => (
                                                    <button
                                                        key={cat}
                                                        onClick={() => setNewEntry({ ...newEntry, category: newEntry.category === cat ? '' : cat })}
                                                        className={`text-xs font-bold px-3 py-1.5 rounded-full transition ${
                                                            newEntry.category === cat
                                                                ? 'ring-2 ring-teal-400 ' + cfg.color
                                                                : cfg.color + ' opacity-50 hover:opacity-80'
                                                        }`}
                                                    >
                                                        {cfg.icon} {cat}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div className="flex gap-3">
                                    <button onClick={() => setViewMode('list')}
                                        className="flex-1 py-4 bg-white text-slate-400 rounded-2xl font-bold shadow-soft">
                                        取消
                                    </button>
                                    <button
                                        onClick={handleAdd}
                                        disabled={loading}
                                        className="flex-1 py-4 bg-teal-500 text-white rounded-2xl font-bold hover:bg-teal-600 disabled:opacity-50 shadow-lg shadow-teal-200 transition"
                                    >
                                        {loading ? "分類中..." : "記錄"}
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ==========================================
        // 工具 11: 急救指南 (First Aid Guide)
        // ==========================================
        function ToolFirstAid({ onBack }) {
            const [input, setInput] = useState('');
            const [image, setImage] = useState(null);
            const [result, setResult] = useState(null);
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                return () => { if (image) URL.revokeObjectURL(image.preview); };
            }, [image]);

            const handleFile = (e) => {
                const file = e.target.files[0];
                if (file) {
                    if (image) URL.revokeObjectURL(image.preview);
                    setImage({ file, preview: URL.createObjectURL(file) });
                }
            };

            const handleSubmit = async () => {
                if (!input.trim() && !image) return;
                setLoading(true);
                try {
                    const parts = [];
                    if (image) {
                        const imgData = await fileToBase64(image.file);
                        parts.push({ inlineData: { data: imgData, mimeType: image.file.type } });
                    }
                    parts.push({ text: input.trim() || "請根據圖片判斷狀況並提供急救建議" });

                    const prompt = `你是大白，一個專業的急救護理機器人。根據使用者描述的症狀或傷口圖片，提供初步急救指引。
注意：你必須在回覆中強調這只是初步建議，嚴重情況請就醫。
使用繁體中文回覆。
JSON結構: {
    "condition": "String (判斷的狀況名稱)",
    "severity": "輕微|中等|嚴重",
    "steps": [{ "step": "String", "detail": "String" }],
    "warning": "String (何時需要就醫)",
    "baymaxTip": "String (大白的溫馨關懷語)"
}`;
                    const data = await callGemini(parts, prompt);
                    setResult(data);
                } catch (e) { /* 錯誤已在 callGemini 處理 */ }
                setLoading(false);
            };

            const severityColor = (s) => {
                if (s === '輕微') return 'bg-emerald-100 text-emerald-600';
                if (s === '嚴重') return 'bg-rose-100 text-rose-600';
                return 'bg-amber-100 text-amber-600';
            };

            const reset = () => {
                if (image) URL.revokeObjectURL(image.preview);
                setInput('');
                setImage(null);
                setResult(null);
            };

            return (
                <div className="flex flex-col h-full animate-slide-up bg-slate-50 md:rounded-[2.5rem] overflow-hidden pt-safe-top">
                    <PageHeader onBack={onBack} title="急救指南" />

                    <div className="flex-1 overflow-y-auto p-6 no-scrollbar pb-safe-bottom">
                        {!result ? (
                            <div className="space-y-4 flex flex-col h-full">
                                {/* 免責聲明 */}
                                <div className="bg-rose-50 border border-rose-100 rounded-2xl p-4 text-xs text-rose-400 leading-relaxed">
                                    ⚠️ 本功能僅供參考，不能取代專業醫療建議。如遇緊急狀況請立即撥打 119。
                                </div>

                                <div className="bg-white rounded-[2rem] p-5 shadow-soft flex-1">
                                    <p className="text-sm text-slate-400 mb-3 font-dot">描述症狀或拍攝傷口，大白為你分析</p>

                                    <textarea
                                        value={input}
                                        onChange={e => setInput(e.target.value)}
                                        placeholder="例如：手指被紙割傷，有少量出血..."
                                        className="w-full bg-slate-50 rounded-xl p-3 outline-none resize-none h-28 text-sm placeholder-slate-300 focus:ring-2 focus:ring-rose-100 transition mb-3"
                                    />

                                    {image ? (
                                        <div className="relative w-full h-40 rounded-xl overflow-hidden shadow-inner bg-slate-100 mb-2">
                                            <img src={image.preview} className="w-full h-full object-contain" />
                                            <button
                                                onClick={() => { URL.revokeObjectURL(image.preview); setImage(null); }}
                                                className="absolute top-2 right-2 bg-black/50 text-white rounded-full p-1"
                                            >
                                                <Icons.X size={14} />
                                            </button>
                                        </div>
                                    ) : (
                                        <label className="w-full h-24 border-2 border-dashed border-slate-200 rounded-xl flex items-center justify-center cursor-pointer hover:bg-slate-50 transition gap-2">
                                            <input type="file" accept="image/*" onChange={handleFile} className="hidden" />
                                            <Icons.Camera className="text-slate-300" size={18} />
                                            <span className="text-xs text-slate-300">拍攝傷口（選填）</span>
                                        </label>
                                    )}
                                </div>

                                <button
                                    onClick={handleSubmit}
                                    disabled={loading || (!input.trim() && !image)}
                                    className="w-full bg-rose-500 text-white py-4 rounded-2xl font-bold shadow-lg shadow-rose-200 disabled:opacity-40 hover:bg-rose-600 transition flex items-center justify-center gap-2"
                                >
                                    {loading ? (
                                        <><Spinner /> 大白分析中...</>
                                    ) : (
                                        <><Icons.HeartPulse size={20} /> 取得急救建議</>
                                    )}
                                </button>
                            </div>
                        ) : (
                            <div className="space-y-4 animate-slide-up">
                                {/* 狀況判斷 */}
                                <div className="bg-white rounded-[2rem] p-6 shadow-soft text-center">
                                    <div className="w-16 h-16 bg-rose-50 rounded-full flex items-center justify-center mx-auto mb-3">
                                        <Icons.HeartPulse size={32} className="text-rose-400" />
                                    </div>
                                    <h3 className="text-2xl font-black text-slate-800 mb-2">{result.condition}</h3>
                                    <span className={`text-xs font-bold px-3 py-1 rounded-full ${severityColor(result.severity)}`}>
                                        {result.severity}
                                    </span>
                                </div>

                                {/* 急救步驟 */}
                                <div className="bg-white rounded-[2rem] p-5 shadow-soft">
                                    <h4 className="text-sm font-bold text-slate-400 mb-3">急救步驟</h4>
                                    <div className="space-y-3">
                                        {(result.steps || []).map((s, i) => (
                                            <div key={i} className="flex gap-3">
                                                <div className="w-7 h-7 bg-rose-100 text-rose-500 rounded-full flex items-center justify-center text-xs font-bold shrink-0 mt-0.5">
                                                    {i + 1}
                                                </div>
                                                <div>
                                                    <div className="font-bold text-slate-700 text-sm">{s.step}</div>
                                                    <div className="text-xs text-slate-400 mt-0.5">{s.detail}</div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* 就醫提醒 */}
                                {result.warning && (
                                    <div className="bg-amber-50 border border-amber-100 rounded-2xl p-4 text-sm text-amber-700">
                                        🏥 <strong>何時就醫：</strong>{result.warning}
                                    </div>
                                )}

                                {/* 大白寄語 */}
                                <div className="bg-slate-800 text-white p-6 rounded-[2rem]">
                                    <div className="flex items-center gap-2 mb-2">
                                        <BaymaxEyes />
                                    </div>
                                    <p className="text-lg font-medium leading-relaxed mt-3">"{result.baymaxTip}"</p>
                                </div>

                                <button onClick={reset} className="w-full py-4 text-slate-400 font-bold">
                                    再問一次
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ==========================================
        // 工具 12: 旅行助手 (Travel Planner)
        // ==========================================
        function ToolTravel({ onBack }) {
            const [plans, setPlans] = useLocalStorage('baymax_travels', []);
            const [viewMode, setViewMode] = useState('list');
            const [selectedId, setSelectedId] = useState(null);
            const [loading, setLoading] = useState(false);
            const [newTrip, setNewTrip] = useState({ destination: '', days: '3', style: '' });

            const travelStyles = [
                { label: '輕鬆慢遊', icon: '🌿' },
                { label: '文化深度', icon: '🏛️' },
                { label: '美食之旅', icon: '🍜' },
                { label: '親子同行', icon: '👨‍👩‍👧' },
                { label: '冒險探索', icon: '🏔️' },
                { label: '購物血拼', icon: '🛍️' },
            ];

            const handleGenerate = async () => {
                if (!newTrip.destination.trim()) {
                    return alert("請輸入目的地");
                }
                setLoading(true);
                try {
                    const styleHint = newTrip.style ? `旅行風格偏好：${newTrip.style}。` : '';
                    const prompt = `你是大白，一個貼心的旅行規劃助手。為使用者規劃前往「${newTrip.destination}」的 ${newTrip.days} 天行程。${styleHint}
使用繁體中文。
JSON結構: {
    "destination": "String",
    "days": Number,
    "summary": "String (一句話描述這趟旅程)",
    "packingList": ["String"],
    "itinerary": [{ "day": Number, "title": "String", "activities": [{ "time": "String", "activity": "String", "tip": "String" }] }],
    "warnings": ["String (當地注意事項)"],
    "baymaxTip": "String"
}`;
                    const data = await callGemini([{ text: `規劃 ${newTrip.destination} ${newTrip.days} 天行程` }], prompt);
                    const plan = { id: Date.now(), ...data, createdAt: new Date().toISOString().split('T')[0] };
                    setPlans(prev => [plan, ...prev]);
                    setSelectedId(plan.id);
                    setViewMode('detail');
                    setNewTrip({ destination: '', days: '3', style: '' });
                } catch (e) {
                    alert("規劃失敗，請重試");
                }
                setLoading(false);
            };

            const handleDelete = (id) => {
                if (confirm("確定刪除此行程？")) {
                    setPlans(prev => prev.filter(p => p.id !== id));
                    if (selectedId === id) { setSelectedId(null); setViewMode('list'); }
                }
            };

            const activePlan = plans.find(p => p.id === selectedId);

            // 行程詳情頁
            if (viewMode === 'detail' && activePlan) {
                const plan = activePlan;
                return (
                    <div className="flex flex-col h-full animate-slide-up bg-sky-50 md:rounded-[2.5rem] overflow-hidden pt-safe-top">
                        <PageHeader onBack={() => { setViewMode('list'); setSelectedId(null); }} title={plan.destination}>
                            <button onClick={() => handleDelete(plan.id)} className="w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-sm text-slate-400 hover:text-rose-500 transition">
                                <Icons.Trash2 size={18} />
                            </button>
                        </PageHeader>
                        <div className="flex-1 overflow-y-auto p-6 no-scrollbar pb-safe-bottom space-y-4">
                            {/* 摘要 */}
                            <div className="bg-white rounded-[2rem] p-5 shadow-soft text-center">
                                <div className="text-4xl mb-2">✈️</div>
                                <h3 className="text-xl font-black text-slate-800">{plan.destination}</h3>
                                <p className="text-sm text-slate-400 mt-1">{plan.days} 天 · {plan.summary}</p>
                            </div>

                            {/* 行李清單 */}
                            <div className="bg-white rounded-[2rem] p-5 shadow-soft">
                                <h4 className="text-sm font-bold text-slate-400 mb-3">🎒 行李清單</h4>
                                <div className="flex flex-wrap gap-2">
                                    {(plan.packingList || []).map((item, i) => (
                                        <span key={i} className="bg-sky-50 text-sky-600 text-xs font-bold px-3 py-1.5 rounded-full">
                                            {item}
                                        </span>
                                    ))}
                                </div>
                            </div>

                            {/* 每日行程 */}
                            {(plan.itinerary || []).map((day, i) => (
                                <div key={i} className="bg-white rounded-[2rem] p-5 shadow-soft">
                                    <div className="flex items-center gap-2 mb-3">
                                        <span className="w-8 h-8 bg-sky-100 text-sky-600 rounded-full flex items-center justify-center text-sm font-bold">
                                            {day.day}
                                        </span>
                                        <h4 className="font-bold text-slate-700">{day.title}</h4>
                                    </div>
                                    <div className="space-y-3 ml-4 border-l-2 border-sky-100 pl-4">
                                        {(day.activities || []).map((act, j) => (
                                            <div key={j}>
                                                <div className="text-xs font-bold text-sky-500">{act.time}</div>
                                                <div className="text-sm font-bold text-slate-700">{act.activity}</div>
                                                {act.tip && <div className="text-xs text-slate-400 mt-0.5">💡 {act.tip}</div>}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))}

                            {/* 注意事項 */}
                            {(plan.warnings || []).length > 0 && (
                                <div className="bg-amber-50 border border-amber-100 rounded-2xl p-4">
                                    <h4 className="text-sm font-bold text-amber-600 mb-2">⚠️ 注意事項</h4>
                                    <ul className="space-y-1">
                                        {plan.warnings.map((w, i) => (
                                            <li key={i} className="text-xs text-amber-700">· {w}</li>
                                        ))}
                                    </ul>
                                </div>
                            )}

                            {/* 大白寄語 */}
                            <div className="bg-slate-800 text-white p-6 rounded-[2rem]">
                                <BaymaxEyes />
                                <p className="text-lg font-medium leading-relaxed mt-3">"{plan.baymaxTip}"</p>
                            </div>
                        </div>
                    </div>
                );
            }

            // 列表頁 / 新增頁
            return (
                <div className="flex flex-col h-full animate-slide-up bg-sky-50 md:rounded-[2.5rem] overflow-hidden pt-safe-top">
                    <PageHeader onBack={onBack} title="旅行助手" bgClass="bg-sky-50/90">
                        {viewMode === 'list' && (
                            <button onClick={() => setViewMode('add')}
                                className="w-10 h-10 bg-sky-500 rounded-full flex items-center justify-center text-white shadow-lg shadow-sky-200 hover:scale-105 active:scale-95 transition">
                                <Icons.Plus size={20} />
                            </button>
                        )}
                    </PageHeader>

                    <div className="flex-1 overflow-y-auto p-6 no-scrollbar pb-safe-bottom">
                        {viewMode === 'list' ? (
                            <div className="space-y-4">
                                {plans.length === 0 && (
                                    <div className="text-center py-20 text-slate-300">
                                        <Icons.MapPin size={48} className="mx-auto mb-4 opacity-30" />
                                        <p className="text-slate-400">還沒有旅行計劃</p>
                                        <p className="text-xs text-slate-300 mt-1">點右上角 + 開始規劃</p>
                                    </div>
                                )}
                                {plans.map(plan => (
                                    <div key={plan.id}
                                        onClick={() => { setSelectedId(plan.id); setViewMode('detail'); }}
                                        className="bg-white rounded-2xl p-5 shadow-soft cursor-pointer active:scale-[0.98] transition group">
                                        <div className="flex justify-between items-start">
                                            <div>
                                                <h3 className="font-bold text-lg text-slate-800">✈️ {plan.destination}</h3>
                                                <p className="text-xs text-slate-400 mt-1">{plan.days} 天 · {plan.createdAt}</p>
                                                <p className="text-sm text-slate-500 mt-2 line-clamp-1">{plan.summary}</p>
                                            </div>
                                            <button onClick={(e) => { e.stopPropagation(); handleDelete(plan.id); }}
                                                className="text-slate-200 hover:text-rose-500 p-1 opacity-0 group-hover:opacity-100 transition">
                                                <Icons.Trash2 size={14} />
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="space-y-4 animate-fade-in">
                                <div className="bg-white rounded-[2rem] p-6 shadow-soft">
                                    <div className="text-center mb-4">
                                        <div className="text-4xl mb-2">🗺️</div>
                                        <h3 className="text-lg font-bold text-slate-700">規劃新旅程</h3>
                                    </div>
                                    <div className="space-y-4">
                                        <div>
                                            <label className="text-xs text-slate-400 font-bold ml-1">目的地</label>
                                            <input autoFocus value={newTrip.destination}
                                                onChange={e => setNewTrip({ ...newTrip, destination: e.target.value })}
                                                placeholder="例如：東京、峇里島、巴黎..."
                                                className="w-full bg-slate-50 p-3 rounded-xl mt-1 outline-none focus:ring-2 focus:ring-sky-100 text-sm" />
                                        </div>
                                        <div>
                                            <label className="text-xs text-slate-400 font-bold ml-1">天數</label>
                                            <div className="flex gap-2 mt-1">
                                                {['2', '3', '5', '7', '10'].map(d => (
                                                    <button key={d} onClick={() => setNewTrip({ ...newTrip, days: d })}
                                                        className={`flex-1 py-2 rounded-xl text-sm font-bold transition ${
                                                            newTrip.days === d ? 'bg-sky-100 text-sky-600 ring-2 ring-sky-300' : 'bg-slate-50 text-slate-400 hover:bg-slate-100'
                                                        }`}>
                                                        {d}天
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                        <div>
                                            <label className="text-xs text-slate-400 font-bold ml-1 mb-2 block">旅行風格（選填）</label>
                                            <div className="flex flex-wrap gap-2">
                                                {travelStyles.map(s => (
                                                    <button key={s.label}
                                                        onClick={() => setNewTrip({ ...newTrip, style: newTrip.style === s.label ? '' : s.label })}
                                                        className={`text-xs font-bold px-3 py-1.5 rounded-full transition ${
                                                            newTrip.style === s.label
                                                                ? 'bg-sky-100 text-sky-600 ring-2 ring-sky-300'
                                                                : 'bg-slate-50 text-slate-400 hover:bg-slate-100'
                                                        }`}>
                                                        {s.icon} {s.label}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div className="flex gap-3">
                                    <button onClick={() => setViewMode('list')}
                                        className="flex-1 py-4 bg-white text-slate-400 rounded-2xl font-bold shadow-soft">取消</button>
                                    <button onClick={handleGenerate} disabled={loading}
                                        className="flex-1 py-4 bg-sky-500 text-white rounded-2xl font-bold hover:bg-sky-600 disabled:opacity-50 shadow-lg shadow-sky-200 transition">
                                        {loading ? "大白規劃中..." : "產生行程"}
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ==========================================
        // 工具 13: 翻譯器 (Translator)
        // ==========================================
        function ToolTranslator({ onBack }) {
            const [input, setInput] = useState('');
            const [image, setImage] = useState(null);
            const [result, setResult] = useState(null);
            const [loading, setLoading] = useState(false);
            const [sourceLang, setSourceLang] = useState('auto');
            const [targetLang, setTargetLang] = useState('zh-TW');

            useEffect(() => {
                return () => { if (image) URL.revokeObjectURL(image.preview); };
            }, [image]);

            const languages = [
                { code: 'auto', label: '自動偵測' },
                { code: 'zh-TW', label: '繁體中文' },
                { code: 'zh-CN', label: '簡體中文' },
                { code: 'en', label: 'English' },
                { code: 'ja', label: '日本語' },
                { code: 'ko', label: '한국어' },
                { code: 'fr', label: 'Français' },
                { code: 'de', label: 'Deutsch' },
                { code: 'es', label: 'Español' },
                { code: 'th', label: 'ไทย' },
            ];

            const targetLanguages = languages.filter(l => l.code !== 'auto');

            const handleFile = (e) => {
                const file = e.target.files[0];
                if (file) {
                    if (image) URL.revokeObjectURL(image.preview);
                    setImage({ file, preview: URL.createObjectURL(file) });
                }
            };

            const speak = (text, lang) => {
                if (!('speechSynthesis' in window) || !text) return;
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text);
                u.lang = lang === 'zh-TW' ? 'zh-TW' : lang === 'zh-CN' ? 'zh-CN' : lang === 'ja' ? 'ja-JP' : lang === 'ko' ? 'ko-KR' : lang;
                u.rate = 0.85;
                window.speechSynthesis.speak(u);
            };

            const handleTranslate = async () => {
                if (!input.trim() && !image) return;
                setLoading(true);
                try {
                    const parts = [];
                    if (image) {
                        const imgData = await fileToBase64(image.file);
                        parts.push({ inlineData: { data: imgData, mimeType: image.file.type } });
                    }

                    const sourceLabel = languages.find(l => l.code === sourceLang)?.label || '自動偵測';
                    const targetLabel = languages.find(l => l.code === targetLang)?.label || '繁體中文';
                    const textContent = input.trim() || "請翻譯圖片中的文字";
                    parts.push({ text: textContent });

                    const prompt = `你是大白翻譯助手。將以下內容從 ${sourceLabel} 翻譯成 ${targetLabel}。
如果來源語言是「自動偵測」，請先判斷來源語言。
如果有圖片，請先辨識圖中文字再翻譯。
JSON結構: {
    "detectedLang": "String (偵測到的來源語言名稱)",
    "originalText": "String (原文，若來自圖片則為辨識結果)",
    "translatedText": "String (翻譯結果)",
    "pronunciation": "String (翻譯結果的拼音/羅馬字發音指引)",
    "phrases": [{ "original": "String", "translated": "String", "note": "String" }]
}`;
                    const data = await callGemini(parts, prompt);
                    setResult(data);
                } catch (e) { /* callGemini 已處理 */ }
                setLoading(false);
            };

            const swapLangs = () => {
                if (sourceLang === 'auto') return;
                const tmp = sourceLang;
                setSourceLang(targetLang);
                setTargetLang(tmp);
            };

            const reset = () => {
                if (image) URL.revokeObjectURL(image.preview);
                setInput('');
                setImage(null);
                setResult(null);
            };

            return (
                <div className="flex flex-col h-full animate-slide-up bg-violet-50 md:rounded-[2.5rem] overflow-hidden pt-safe-top">
                    <PageHeader onBack={onBack} title="翻譯器" bgClass="bg-violet-50/90" />

                    <div className="flex-1 overflow-y-auto p-6 no-scrollbar pb-safe-bottom">
                        {/* 語言選擇列 */}
                        <div className="bg-white rounded-2xl p-3 shadow-soft mb-4 flex items-center gap-2">
                            <select value={sourceLang} onChange={e => setSourceLang(e.target.value)}
                                className="flex-1 bg-slate-50 rounded-xl px-3 py-2 text-sm font-bold text-slate-600 outline-none appearance-none text-center cursor-pointer">
                                {languages.map(l => <option key={l.code} value={l.code}>{l.label}</option>)}
                            </select>
                            <button onClick={swapLangs}
                                className={`w-8 h-8 rounded-full flex items-center justify-center text-sm transition ${
                                    sourceLang === 'auto' ? 'text-slate-200 cursor-not-allowed' : 'bg-violet-100 text-violet-500 hover:bg-violet-200 active:scale-90'
                                }`}>
                                ⇄
                            </button>
                            <select value={targetLang} onChange={e => setTargetLang(e.target.value)}
                                className="flex-1 bg-slate-50 rounded-xl px-3 py-2 text-sm font-bold text-slate-600 outline-none appearance-none text-center cursor-pointer">
                                {targetLanguages.map(l => <option key={l.code} value={l.code}>{l.label}</option>)}
                            </select>
                        </div>

                        {/* 輸入區 */}
                        <div className="bg-white rounded-[2rem] p-5 shadow-soft mb-4">
                            <textarea
                                value={input}
                                onChange={e => setInput(e.target.value)}
                                placeholder="輸入要翻譯的文字..."
                                className="w-full bg-transparent outline-none resize-none h-28 text-sm placeholder-slate-300"
                            />
                            <div className="flex justify-between items-center mt-2 pt-2 border-t border-slate-50">
                                {image ? (
                                    <div className="flex items-center gap-2">
                                        <div className="w-10 h-10 rounded-lg overflow-hidden">
                                            <img src={image.preview} className="w-full h-full object-cover" />
                                        </div>
                                        <button onClick={() => { URL.revokeObjectURL(image.preview); setImage(null); }}
                                            className="text-slate-300 hover:text-rose-500">
                                            <Icons.X size={14} />
                                        </button>
                                    </div>
                                ) : (
                                    <label className="flex items-center gap-1 text-slate-300 hover:text-violet-400 cursor-pointer transition">
                                        <input type="file" accept="image/*" onChange={handleFile} className="hidden" />
                                        <Icons.Camera size={16} />
                                        <span className="text-xs">拍照翻譯</span>
                                    </label>
                                )}
                                <button onClick={handleTranslate}
                                    disabled={loading || (!input.trim() && !image)}
                                    className="bg-violet-500 text-white px-5 py-2 rounded-xl font-bold text-sm disabled:opacity-40 hover:bg-violet-600 transition shadow-lg shadow-violet-200 flex items-center gap-1">
                                    {loading ? <><Spinner /> 翻譯中</> : <><Icons.Languages size={16} /> 翻譯</>}
                                </button>
                            </div>
                        </div>

                        {/* 翻譯結果 */}
                        {result && (
                            <div className="space-y-4 animate-slide-up">
                                {/* 偵測語言 */}
                                {result.detectedLang && (
                                    <div className="text-center text-xs text-slate-400">
                                        偵測到：<span className="font-bold text-violet-500">{result.detectedLang}</span>
                                    </div>
                                )}

                                {/* 原文 */}
                                {result.originalText && result.originalText !== input && (
                                    <div className="bg-white rounded-2xl p-4 shadow-soft">
                                        <div className="flex justify-between items-center mb-1">
                                            <h4 className="text-xs font-bold text-slate-400">原文</h4>
                                            <button onClick={() => speak(result.originalText, sourceLang === 'auto' ? 'en' : sourceLang)}
                                                className="text-slate-300 hover:text-violet-500 transition text-xs">🔊</button>
                                        </div>
                                        <p className="text-sm text-slate-600">{result.originalText}</p>
                                    </div>
                                )}

                                {/* 翻譯結果 */}
                                <div className="bg-violet-500 text-white rounded-[2rem] p-5 shadow-lg shadow-violet-200">
                                    <div className="flex justify-between items-start mb-2">
                                        <h4 className="text-xs font-bold text-violet-200">翻譯結果</h4>
                                        <button onClick={() => speak(result.translatedText, targetLang)}
                                            className="text-violet-200 hover:text-white transition text-sm">🔊</button>
                                    </div>
                                    <p className="text-lg font-bold leading-relaxed">{result.translatedText}</p>
                                    {result.pronunciation && (
                                        <p className="text-xs text-violet-200 mt-2 italic">{result.pronunciation}</p>
                                    )}
                                </div>

                                {/* 重點片語 */}
                                {(result.phrases || []).length > 0 && (
                                    <div className="bg-white rounded-[2rem] p-5 shadow-soft">
                                        <h4 className="text-xs font-bold text-slate-400 mb-3">重點片語</h4>
                                        <div className="space-y-2">
                                            {result.phrases.map((p, i) => (
                                                <div key={i} className="flex items-start gap-3 bg-slate-50 p-3 rounded-xl">
                                                    <div className="flex-1">
                                                        <div className="text-sm font-bold text-slate-700">{p.original}</div>
                                                        <div className="text-sm text-violet-500">{p.translated}</div>
                                                    </div>
                                                    {p.note && <div className="text-[10px] text-slate-400 max-w-[100px]">{p.note}</div>}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                <button onClick={reset} className="w-full py-4 text-slate-400 font-bold">
                                    再翻一次
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ==========================================
        // 工具：設定頁面
        // ==========================================
        function ToolSettings({ onBack }) {
            const [keyInput, setKeyInput] = useState('');
            const [showKey, setShowKey] = useState(false);
            const [testStatus, setTestStatus] = useState(null); // null | 'testing' | 'success' | 'error'
            const [testMsg, setTestMsg] = useState('');
            const [saved, setSaved] = useState(false);

            // 載入已儲存的 key
            useEffect(() => {
                try {
                    const stored = localStorage.getItem('baymax_api_key');
                    if (stored) setKeyInput(stored);
                } catch (e) {}
            }, []);

            const currentKey = getApiKey();
            const isUsingDefault = !localStorage.getItem('baymax_api_key') || localStorage.getItem('baymax_api_key')?.trim() === '';
            const maskedKey = (key) => {
                if (!key) return '';
                if (key.length <= 8) return '••••••••';
                return key.slice(0, 4) + '••••••••••••' + key.slice(-4);
            };

            const handleSave = () => {
                const trimmed = keyInput.trim();
                if (trimmed) {
                    localStorage.setItem('baymax_api_key', trimmed);
                } else {
                    localStorage.removeItem('baymax_api_key');
                }
                setSaved(true);
                setTestStatus(null);
                setTimeout(() => setSaved(false), 2000);
            };

            const handleReset = () => {
                localStorage.removeItem('baymax_api_key');
                setKeyInput('');
                setSaved(true);
                setTestStatus(null);
                setTimeout(() => setSaved(false), 2000);
            };

            const handleTest = async () => {
                setTestStatus('testing');
                setTestMsg('');
                const key = keyInput.trim() || DEFAULT_API_KEY;
                try {
                    const response = await fetch(`${API_URL}?key=${key}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            contents: [{ role: "user", parts: [{ text: "回覆 OK" }] }],
                            generationConfig: { maxOutputTokens: 10 }
                        }),
                    });
                    if (response.ok) {
                        setTestStatus('success');
                        setTestMsg('API Key 連線成功！');
                    } else {
                        const errText = await response.text();
                        setTestStatus('error');
                        if (response.status === 400 || response.status === 403) {
                            setTestMsg('API Key 無效或已過期');
                        } else {
                            setTestMsg(`錯誤 ${response.status}: ${errText.slice(0, 100)}`);
                        }
                    }
                } catch (err) {
                    setTestStatus('error');
                    setTestMsg('連線失敗：無法連接伺服器');
                }
            };

            return (
                <div className="h-full flex flex-col animate-fade-in">
                    <PageHeader title="設定" subtitle="API 金鑰管理" onBack={onBack} />
                    <div className="flex-1 overflow-y-auto no-scrollbar space-y-4 pb-10">

                        {/* 說明卡片 */}
                        <div className="bg-white rounded-[2rem] p-5 shadow-soft">
                            <div className="flex items-center gap-3 mb-3">
                                <div className="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center">
                                    <Icons.Settings size={20} className="text-blue-500" />
                                </div>
                                <h3 className="font-bold text-slate-700">API Key 設定</h3>
                            </div>
                            <p className="text-sm text-slate-500 leading-relaxed">
                                本應用使用 Google Gemini API 提供 AI 功能。你可以使用預設的 API Key，或填入自己的 Key 來獲得更穩定的服務。
                            </p>
                        </div>

                        {/* 當前狀態 */}
                        <div className="bg-white rounded-[2rem] p-5 shadow-soft">
                            <h4 className="text-xs font-bold text-slate-400 mb-3">目前使用的 Key</h4>
                            <div className={`flex items-center gap-2 px-4 py-3 rounded-xl ${isUsingDefault ? 'bg-amber-50' : 'bg-green-50'}`}>
                                <div className={`w-2 h-2 rounded-full ${isUsingDefault ? 'bg-amber-400' : 'bg-green-400'}`}></div>
                                <span className={`text-sm font-medium ${isUsingDefault ? 'text-amber-700' : 'text-green-700'}`}>
                                    {isUsingDefault ? '使用預設 Key' : '使用自訂 Key'}
                                </span>
                            </div>
                            <div className="mt-2 px-4 py-2 bg-slate-50 rounded-xl">
                                <code className="text-xs text-slate-400 break-all font-mono">
                                    {maskedKey(currentKey)}
                                </code>
                            </div>
                        </div>

                        {/* 輸入 API Key */}
                        <div className="bg-white rounded-[2rem] p-5 shadow-soft">
                            <h4 className="text-xs font-bold text-slate-400 mb-3">自訂 API Key</h4>
                            <div className="relative">
                                <input
                                    type={showKey ? "text" : "password"}
                                    value={keyInput}
                                    onChange={(e) => { setKeyInput(e.target.value); setSaved(false); }}
                                    placeholder="貼上你的 Gemini API Key..."
                                    className="w-full px-4 py-3 pr-12 rounded-xl bg-slate-50 border-2 border-slate-100 focus:border-blue-300 focus:outline-none text-sm text-slate-700 font-mono transition"
                                />
                                <button
                                    onClick={() => setShowKey(!showKey)}
                                    className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition"
                                >
                                    {showKey ? <Icons.EyeOff size={18} /> : <Icons.Eye size={18} />}
                                </button>
                            </div>

                            {/* 操作按鈕 */}
                            <div className="flex gap-2 mt-4">
                                <button
                                    onClick={handleSave}
                                    className="flex-1 py-3 bg-blue-500 text-white rounded-xl font-bold text-sm hover:bg-blue-600 active:scale-95 transition-all"
                                >
                                    {saved ? '✓ 已儲存' : '儲存'}
                                </button>
                                <button
                                    onClick={handleTest}
                                    disabled={testStatus === 'testing'}
                                    className="flex-1 py-3 bg-slate-100 text-slate-600 rounded-xl font-bold text-sm hover:bg-slate-200 active:scale-95 transition-all disabled:opacity-50"
                                >
                                    {testStatus === 'testing' ? '測試中...' : '測試連線'}
                                </button>
                                <button
                                    onClick={handleReset}
                                    className="py-3 px-4 bg-red-50 text-red-400 rounded-xl font-bold text-sm hover:bg-red-100 active:scale-95 transition-all"
                                >
                                    重設
                                </button>
                            </div>

                            {/* 測試結果 */}
                            {testStatus && testStatus !== 'testing' && (
                                <div className={`mt-3 px-4 py-3 rounded-xl text-sm font-medium ${testStatus === 'success' ? 'bg-green-50 text-green-600' : 'bg-red-50 text-red-500'}`}>
                                    {testMsg}
                                </div>
                            )}
                        </div>

                        {/* 安全提示 */}
                        <div className="bg-gradient-to-br from-slate-800 to-slate-900 rounded-[2rem] p-5 shadow-lg">
                            <h4 className="text-xs font-bold text-slate-400 mb-3">🔒 安全建議</h4>
                            <div className="space-y-3 text-sm text-slate-300 leading-relaxed">
                                <div className="flex items-start gap-2">
                                    <span className="text-amber-400 shrink-0 mt-0.5">1.</span>
                                    <p><strong className="text-white">不要共享含有 API Key 的網址。</strong>前端 JavaScript 中的 Key 任何人都能透過瀏覽器開發者工具看到。</p>
                                </div>
                                <div className="flex items-start gap-2">
                                    <span className="text-amber-400 shrink-0 mt-0.5">2.</span>
                                    <p><strong className="text-white">建議設定 API Key 使用限制。</strong>到 <span className="text-blue-400">Google AI Studio</span> 設定每日用量上限，避免被濫用。</p>
                                </div>
                                <div className="flex items-start gap-2">
                                    <span className="text-amber-400 shrink-0 mt-0.5">3.</span>
                                    <p><strong className="text-white">理想做法：使用後端代理。</strong>將 API Key 存放在伺服器端（如 Vercel / Cloudflare Workers），前端只呼叫你自己的 API 端點，Key 永遠不會暴露。</p>
                                </div>
                                <div className="flex items-start gap-2">
                                    <span className="text-amber-400 shrink-0 mt-0.5">4.</span>
                                    <p><strong className="text-white">定期輪換 Key。</strong>如果懷疑 Key 被洩漏，立即到 Google AI Studio 重新產生新的 Key。</p>
                                </div>
                            </div>
                        </div>

                        {/* 取得 Key 指引 */}
                        <div className="bg-white rounded-[2rem] p-5 shadow-soft">
                            <h4 className="text-xs font-bold text-slate-400 mb-3">如何取得 API Key？</h4>
                            <ol className="space-y-2 text-sm text-slate-600">
                                <li className="flex items-start gap-2">
                                    <span className="bg-blue-100 text-blue-600 rounded-full w-5 h-5 flex items-center justify-center text-xs font-bold shrink-0 mt-0.5">1</span>
                                    <span>前往 <strong>Google AI Studio</strong> (aistudio.google.com)</span>
                                </li>
                                <li className="flex items-start gap-2">
                                    <span className="bg-blue-100 text-blue-600 rounded-full w-5 h-5 flex items-center justify-center text-xs font-bold shrink-0 mt-0.5">2</span>
                                    <span>登入 Google 帳號後，點擊 <strong>「Get API Key」</strong></span>
                                </li>
                                <li className="flex items-start gap-2">
                                    <span className="bg-blue-100 text-blue-600 rounded-full w-5 h-5 flex items-center justify-center text-xs font-bold shrink-0 mt-0.5">3</span>
                                    <span>點擊 <strong>「Create API Key」</strong>，選擇或建立 GCP 專案</span>
                                </li>
                                <li className="flex items-start gap-2">
                                    <span className="bg-blue-100 text-blue-600 rounded-full w-5 h-5 flex items-center justify-center text-xs font-bold shrink-0 mt-0.5">4</span>
                                    <span>複製產生的 Key，貼到上方欄位即可</span>
                                </li>
                            </ol>
                        </div>

                    </div>
                </div>
            );
        }

        // ==========================================
        // 主程式：Baymax OS
        // ==========================================
        function App() {
            const [view, setView] = useState('home');

            const tools = [
                { id: 'baymax', name: '健康大白', icon: <Icons.Stethoscope size={28} />, desc: '食品營養分析' },
                { id: 'vocab', name: '記憶晶片', icon: <Icons.BookA size={28} />, desc: '單字庫' },
                { id: 'learning', name: '學習助手', icon: <Icons.GraduationCap size={28} />, desc: '解題/問答/文法' },
                { id: 'clothes', name: '衣物護理', icon: <Icons.Shirt size={28} />, desc: '洗標辨識' },
                { id: 'password', name: '保險箱', icon: <Icons.Lock size={28} />, desc: '密碼管理' },
                { id: 'movie', name: '影視庫', icon: <Icons.Film size={28} />, desc: '電影收藏' },
                { id: 'pomodoro', name: '專注模式', icon: <Icons.Timer size={28} />, desc: '番茄鐘' },
                { id: 'recipe', name: '食譜助手', icon: <Icons.UtensilsCrossed size={28} />, desc: '智能推薦菜色' },
                { id: 'habit', name: '習慣追蹤', icon: <Icons.CheckSquare size={28} />, desc: '每日打卡' },
                { id: 'expense', name: '記帳本', icon: <Icons.Wallet size={28} />, desc: '支出管理' },
                { id: 'firstaid', name: '急救指南', icon: <Icons.HeartPulse size={28} />, desc: '初步急救建議' },
                { id: 'travel', name: '旅行助手', icon: <Icons.MapPin size={28} />, desc: '行程規劃' },
                { id: 'translator', name: '翻譯器', icon: <Icons.Languages size={28} />, desc: '多語翻譯' },
            ];

            const toolComponents = {
                baymax: ToolBaymax,
                vocab: ToolVocab,
                learning: ToolLearning,
                clothes: ToolClothes,
                password: ToolPassword,
                movie: ToolMovie,
                pomodoro: ToolPomodoro,
                recipe: ToolRecipe,
                habit: ToolHabit,
                expense: ToolExpense,
                firstaid: ToolFirstAid,
                travel: ToolTravel,
                translator: ToolTranslator,
                settings: ToolSettings,
            };

            const goHome = useCallback(() => setView('home'), []);

            // 渲染對應工具元件
            const ActiveTool = toolComponents[view];

            return (
                <div className="w-full h-[100dvh] bg-slate-200 md:bg-slate-100 md:max-w-md md:h-[850px] md:rounded-[3.5rem] md:shadow-xl md:shadow-slate-300 relative flex flex-col md:border-[14px] md:border-slate-900 overflow-hidden font-sans">

                    {/* Baymax 頂部識別區 */}
                    <div className="bg-white h-24 rounded-b-[2.5rem] shadow-soft flex flex-col items-center justify-end pb-4 shrink-0 relative z-20">
                        <BaymaxEyes />
                        <div className="text-[10px] font-bold text-slate-300 tracking-[0.3em] mt-3 uppercase">
                            Personal Companion
                        </div>
                        {/* 設定按鈕 */}
                        <button
                            onClick={() => setView('settings')}
                            className="absolute right-4 bottom-4 w-8 h-8 rounded-full bg-slate-50 hover:bg-slate-100 flex items-center justify-center text-slate-400 hover:text-slate-600 transition-all active:scale-90"
                            title="設定"
                        >
                            <Icons.Settings size={16} />
                        </button>
                    </div>

                    <div className="flex-1 bg-slate-100 p-4 overflow-hidden relative">
                        {view === 'home' && (
                            <div className="h-full flex flex-col animate-fade-in">
                                <div className="mb-4 px-2 shrink-0">
                                    <h1 className="text-3xl font-black text-slate-800 leading-tight">
                                        你好。<br />我是<span className="text-rose-500">大白</span>。
                                    </h1>
                                    <p className="text-slate-400 mt-1 font-medium">你的個人健康護理助理。</p>
                                </div>
                                <div className="flex-1 min-h-0 overflow-y-auto no-scrollbar grid grid-cols-2 gap-4 auto-rows-min content-start pb-safe-bottom px-1">
                                    {tools.map((tool) => (
                                        <button
                                            key={tool.id}
                                            onClick={() => { if (!tool.id.startsWith('coming')) setView(tool.id); }}
                                            className={`p-5 rounded-[2.5rem] text-left transition-all duration-300 flex flex-col justify-between aspect-square group relative overflow-hidden active:scale-95 shadow-card hover:shadow-soft bg-white border border-slate-100
                                                ${tool.id.startsWith('coming') ? 'opacity-50 cursor-default' : ''}`}
                                        >
                                            <div className="w-14 h-14 rounded-full flex items-center justify-center mb-2 bg-slate-50 text-slate-600 group-hover:bg-rose-50 group-hover:text-rose-500 transition-colors">
                                                {tool.icon}
                                            </div>
                                            <div className="relative z-10">
                                                <div className="font-bold text-lg text-slate-700">{tool.name}</div>
                                                <div className="text-[11px] opacity-60 mt-1 font-medium tracking-wide text-slate-500">
                                                    {tool.desc}
                                                </div>
                                            </div>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {ActiveTool && view !== 'home' && <ActiveTool onBack={goHome} />}
                    </div>

                    {/* 底部裝飾條 (模擬手機 Home Bar) */}
                    <div className="absolute bottom-2 left-1/2 -translate-x-1/2 w-32 h-1 bg-slate-300 rounded-full md:mb-4"></div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
